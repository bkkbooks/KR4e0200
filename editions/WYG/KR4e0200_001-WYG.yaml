body:
  text: 楊忠愍集巻一明楊繼盛撰奏疏請罷馬市疏兵部車駕清吏司署員外郎事主事臣楊繼盛謹奏為乞賜聖斷罷開馬市以全國威以絶邊患事臣以南京吏部驗封清吏司主事考滿到京陞臣今職荷蒙皇上養育簡用之恩雖粉骨碎身何以克報况臣官居兵曹職專馬政覩此開馬市之誤豈敢苟避禍患隨衆隠黙不言竊惟去年賊冦悖逆天道大肆猖獗犯我城闕殺我人民擄我妻子焚我廬舍驚我陵寢其辱我中國極矣臣在南都傳聞此報冠髪上指肝腸寸裂恨不能身生兩翼飛至都下以剿逆賊以報國讎茲者恭遇皇上赫然震怒選將練兵尅日興師聲罪致討以報百萬赤子之讐以雪城下陵辱之恥不惟天下臣民共相慶幸我列祖在天之靈亦相慶幸多矣及臣至都下見俺答求開馬市之書大放肆無狀竊意上觸聖怒其征討之志已決其問罪之師斷不可已及廷臣㑹議題奉欽依准暫開行臣不覺仰天大呼喟然長歎曰國事乃至此哉國事乃至此哉夫以漢之武帝唐之太宗不過二霸主耳猶能威震方外氣壓突厥以皇上之英武國家之全盛英雄豪傑勇夫壯士之伏於草茅下位者又不可勝數其蠢茲賊寇反不能生擒酋長剿絶苗裔而乃為此不得已下策之事哉臣請以開馬市之十不可者為皇上陳之夫開馬市者和議之别名也寇素賔服尚不可言及此去年入寇殺擄如此之慘則神人所共憤不共戴天之深讎矣今不惟不能聲罪復讎而反與之為此和議之事何以上解列祖之怒下舒百姓之恨乎此忘天下之大讎一不可也信者人君之大寶雖匹夫匹婦尚不可少失信義况於天子之尊哉皇上北伐之命屢下臣民所共知四裔所共喻者也方今各處兵馬集矣糧草器械備矣天下日夜引領仰望王師之興真若大旱之望雲雨也乃翻然而有開馬市之議則平日之所以選將練兵者為何備糧草精器械者為何不有以孤百姓仰望之心乎此失天下之信義二不可也人君居中制外統馭四裔以其有國威之重以屈服之也今以堂堂天朝之尊而下與賊寇為此交易之事是天壤混淆冠履同器將不取笑於天下後世乎此損國家之重威三不可也天下豪傑聞賊寇殺戮人民之慘姦擄婦女之辱其憤恨不平之氣皆欲與逆賊決一死戰雖深山窮谷之隠逸亦願出以復天下之讎今馬市一開則舉相謂曰朝廷忘赤子之讎厭兵甲之用矣將焉用我哉將見在林下者不肯出在冊籍者將謀去矣異日欲復召號誰肯興起此隳豪傑效用之志四不可也自去嵗大變之後天下頗講武事雖童子儒生亦知習兵此機既動兵將日强今馬市一開則舉相謂曰中國外域已和天下已無事矣將焉用武哉有邊鎮之責者日弛其封守之防無兵戎之寄者益惰其偷安之氣矣廢弛既久一旦有急何以整頓此懈天下修武之心五不可也宣大人民懐攜貳之心久矣一向雖有交寇之事猶畏王法之嚴而不敢自肆也今馬市一開則彼之交通者乃王法所不禁將來勾引之禍可勝言乎此開邊方通賊之門六不可也天下人民憚於水旱征役之苦人人有思亂之心特畏國家之兵威而不敢變動也今馬市一開則彼皆以為天下兵威已弱蠢茲醜賊尚不能服羣起為盜又焉能制則將來腹心之變可勝言乎此起百姓不靖之漸七不可也去嵗賊寇深入雖未見一兵交戰然猶以為我軍倉卒未備其疑畏之心尚在也今皇上聲罪致討調兵半年及至於今止為馬市之開則彼得以窺我之虛實矣目中又奚有乎我哉此長賊寇輕中國之心八不可也賊寇之性詐變無常謀深計巧反出我之上我將欲以此羈縻乎彼殊不知彼實以此愚弄乎我或遣重臣載金帛至邊等候開市彼違約不來交易未可知也或因交易而即行猖獗撞闗而入未可知也或今日交易而明日入寇未可知也或遣衆入寇而駕言别部落入寇未可知也或以疲馬而過索重價或因市馬而過討重賞或市馬之後而别有分外不堪之求又未可知也是我不能以羈縻乎彼彼反得以愚弄乎我矣此墮賊寇狡詐之計九不可也賊寇之産馬有窮中國之生財有限大同之馬市一開宣府延綏等處定不可罷以馬與銀數計之每年市馬約數十萬匹四五年間須得馬數百萬匹每年約用銀數百萬兩四五年間須費銀數千萬兩一旦賊寇之馬已盡中國之財告乏將安處乎永久之計將安在乎此中國之財賊寇之馬兩難相繼十不可也彼倡為開馬市之議以欺誑皇上者其謬説不過有五有曰外開馬市暫以為羈縻之術内修武備實以為戰守之計耳殊不知馬市之開乃所以羈縻乎我非所以羈縻乎彼也賊性無饜請開馬市之後或别有所請許之再有所請又許之請之不已漸至於甚不堪者一不如意彼即違約則彼之入寇為有名我之不應其所求為失信矣孰謂賊寇無饜之欲可以市馬之小利羈縻之乎如曰欲修武備以圖戰守雖不用此羈縻之術亦可矣此其説之謬一也有曰方今急缺馬用正欲買馬一開馬市則我馬漸多彼馬漸少豈不兩便然市馬非以之耕田駕車也不過為征討計耳如交易果可以無事則市馬又將安用乎不益重其寄養之擾乎况賊以馬為生彼安肯以自乗之良馬而市於我乎不過瘦弱不堪之物不服水草將不日俱斃而已此其説之謬二也有曰初許市馬暫繫乎賊寇之心將來許貢則可為永久之計夫謂之進貢者豈古之所謂咸賔來王者哉不過我賄彼以重利苟免目前之不來彼貪我之重利暫許目前之不入耳况市馬我猶得以少償其費許貢則彼白手來取重利矣是市馬則獲小利而無名開貢則雖有名而費大市馬固不可許貢亦豈可哉此其説之謬三也有曰賊雖狡詐最不失信觀其聲言某時搶某處再不愆期可驗彼既許其市後不來則斷保其再不入寇殊不知賊之種類日繁加之以擄掠人口日増其日用之服食器用俱仰給於中國市馬之利焉足以盡供其所費彼非盡皆義士孰肯守小信而甘於凍餒以至於死乎縱使少有羈縻不過暫保一二年無事耳不知二三年之後將何如處哉此其説之謬四也又有曰佳兵不祥不可輕用與其勞師動衆征討於千里之外而勝負難必孰若暫開馬市休兵息民而急修内治之為上乎噫為此説者是損國家之兵威養賊寇於日盛壊天下之大事必自此言始矣若曰佳兵不祥則舜之征苗文之遏莒湯之伐葛伯髙宗之伐鬼方豈盡皆不祥者哉葢春生秋殺之迭行上天生物之道也恩賞兵刑之並用王者御世之權也譬如人身四肢俱皆癰疽毒日内攻乃猶專食膏粱而憚用藥石將不至於傷其元氣乎此其説之謬五也夫此十不可五謬之説明白易知則馬市之開不利於我中國明矣而於寇賊則甚利焉葢數十年來寇賊以中國之百姓為佃户秋後則入而收其租雖已得計猶有往來奔走之苦日夜殺人之勞也去年入寇莫敢與敵虚實既已覘矣故今請開馬市則可以坐收中國之重利况馬多擄自中國者春時草枯則市之秋後馬肥則入而再擄之及至來春又再市之以輪迴之馬獲青蚨之利是昔日彼猶為出門討租之人今日我則為上門納租之戸臣言及此其憤恨可勝言哉夫此事利於寇賊而不利於中國滿朝臣工皆知其不可然有人敢議而行之無一人敢非而止者何哉彼議而行之者其意以為征討之事已難收拾賊再入寇皇上剛明必追究夫謀國者之不忠專征者之不勇誤事之禍何以能免况前日交通已有成效莫若委曲致開馬市猶可二三年苟延日後時事未知如何且暫免目前之禍暫固目前之寵賊縱背約再為脱避之計未晩也然不思皇上所以寵任之專禮遇之厚爵位之重錫予之隆者葢欲其主張國是征討逆賊也豈徒欲開馬市而已哉其所以不敢非而止之者其意以為事權既不在我時勢已至鶻突有欲謝重擔於人而無由者吾何以冒禍擔當使有所言而馬市罷開弛其防守而賊再深入則必歸咎於止開馬市之人加之以誤國事之罪矣孰若隠黙不言大家因循之為上乎然賊寇之寇與不寇不係於馬市之開與不開前此未嘗有議開馬市而止之者去年賊寇何以深入此時罷開馬市賊或入寇亦與去年同耳止開馬市之人夫豈誤天下之事者哉臣以孤寒進士初入仕途父母早喪妻子無依非不知隠黙足以自保言事足以取禍也竊惟皇上初時震怒奮武其氣若此之壯命將征討其志若此之勇則知今日馬市之開乃議者之姦計斷非皇上之本心也以皇上之英武而臣下庸輭避事不足以副之心欲持行而手足痿痺良可深恨此事係國家盛衰之機臣敢預憂後禍忍心隠黙乎伏乞皇上俯察愚臣之罪言回思欲討之初志念賊寇之志欲難饜非市馬小利足以係屬其心祖宗之社稷無疆非二三年苟安無事可以永保其緒收回成命罷開馬市鋭意戎兵決志征討務欲擒俺答於闕前驅醜類於海外使賊之畏乎我亦猶我之防乎彼則上而祖宗幸甚下而臣民幸甚謹奏奉聖㫖這事邊臣奏來已久又㑹官集議楊繼盛既有所見何不早言今差官已行却乃肆意凟奏好生阻撓邊機揺惑人心又本内脱一字著錦衣衞拿送鎮撫司打著問了來説請誅賊臣疏兵部武選清吏司署員外郎事主事臣楊繼盛謹奏為感激天恩捨身圖報乞賜聖斷早誅姦險巧佞專權賊臣以清朝政以絶邊患事臣前任兵部車駕司員外郎諌阻馬市言不及時本内脱字罪應下獄被逆鸞威屬問官將臣手指桚折脛骨夾出必欲置之於死荷䝉皇上聖恩薄罰降謫不二年間復陞今職夫以孤直罪臣不死逆鸞之手已為萬幸而又遷轉如此之速則自今已往之年皆皇上再生之身自今已往之官皆皇上欽賜之職也臣䝉此莫大之恩則凡事有益於國家可以仰報萬一者雖死有所不顧而日夜秪懼思所以捨身圖報之道又未有急於請誅賊臣者也况臣官居兵曹以討賊為職然賊不專於外患凡有害於社稷人民者均謂之賊臣觀大學士嚴嵩盜權竊柄誤國殃民其天下之第一大賊乎方今在外之賊惟邉境為急在内之賊惟嚴嵩為最賊寇者邊境之盜瘡疥之疾也賊嵩者門庭之寇心腹之害也賊有内外攻宜有先後未有内賊不去而可以除外賊者故臣請誅賊嵩當在剿絶賊寇之先且嵩之罪惡貫盈神人共憤徐學詩沈鍊王宗茂等常劾之矣然止皆言嵩貪汙之小而未嘗發嵩僭竊之罪嵩之奸佞又善為撫飾之巧而足以反誣言者之非皇上之仁恕又冀嵩感容留之恩而圖為改邪歸正之道故嵩猶得竊位至今嵩於此時日夜感恩改過可也豈意懼言者之多而益密其彌縫之計因皇上之留而愈恣其無忌憚之為衆惡俱備四端已絶雖離經畔道取天下後世之唾罵亦有所不顧矣幸賴皇上敬天之誠格於皇天上天恐奸臣害皇上之治而屢示災變以警告去年春雷久不聲占云大臣專政然臣莫大於嵩而專政亦未有過於嵩者去年冬日下有赤色占云下有叛臣夫曰叛者非謀反之謂也凡心不在君而背之者皆謂之叛然則背君之臣又孰有過於嵩乎如各處地震與夫日月交食之變其災皆當應於賊嵩之身者乃日侍其側而不覺上天仁愛警告之心亦恐怠且孤矣不意皇上聰明剛斷乃甘受嵩欺人言既不見信雖上天示警亦不省悟以至於此也臣敢以嵩之專政叛君之十大罪為皇上陳之我太祖髙皇帝親見宰相專權之禍遂詔天下罷中書丞相而立五府九卿分理庶政殿閣之臣惟備顧問視制草不得平章國事故載諸祖訓有曰以後子孫作皇帝時臣下有建言設立丞相者本人凌遲全家處死此其為聖子神孫計至深逺也及嵩為輔臣儼然以丞相自居挾皇上之權侵百司之事凡府部每事之題覆其初惟先呈稿而後敢行及今則先面稟而後敢起稿嵩之直房百官奔走如市府部堂司嵩差人絡繹不絶事無大小惟嵩主張一或少違顯禍立見及至失事又謝罪於人雖以前丞相之專恣未有如斯之甚者是嵩雖無丞相之名而有丞相之權有丞相之權又無丞相之干係以故各官之陞遷未及謝恩先拜謝嵩葢惟知事權出於嵩惟知畏懼奉承於嵩而已此壊祖宗之成法一大罪也權者人君所以綂馭天下之具不可一日下移臣下亦不可毫髪僭踰皇上令嵩票本葢任人圖政之誠心也豈意嵩一有票本之任遂竊威福之權且如皇上用一人嵩即差人先報曰我票本薦之也及皇上黜一人嵩又揚言於衆曰此人不親附於我故票本罷之皇上宥一人嵩即差人先報曰我票本救之也及皇上罰一人嵩又揚言於衆曰此人得罪於我故票本報之凡少有得罪於嵩者雖小心躱避嵩亦尋别本帶出㫖意報復陷害是嵩竊皇上之恩以市己之惠假皇上之罰以彰己之威所以羣臣感嵩之惠甚於感皇上之恩畏嵩之威甚於畏皇上之罰也用舍賞罰之權既歸於嵩大小臣工又盡附於嵩嵩之心膽將不日大且肆乎臣不意皇上之明斷乃假權於賊手如此也此竊皇上之大權二大罪也善則稱君過則歸已人臣事君之忠也書曰爾有嘉謨嘉猷則入告爾后于内爾乃順之于外曰斯謨斯猷惟我后之德葢人臣以己之善而歸之於君使天下皆稱頌君之德不敢彰己之能以與君爭功也嵩於皇上行政之善每事必令子世蕃傳於人曰皇上初無此意此事是我議而成之葢惟恐天下之人不知事權之出於己也及今則將聖諭及嵩所進揭帖刻板刊行為書十冊名曰嘉靖疏議使天下後世皆謂皇上以前所行之善盡出彼之撥置主張皇上若一無所能者人臣善則稱君之忠果若此乎此掩皇上之治功三大罪也皇上令嵩票本葢君逸臣勞之意嵩乃令子世蕃代票恣父逸子勞之為世蕃却又約諸乾兒子趙文華等羣㑹票擬結成姦黨亂政滋弊一票屢更數手機密豈不漏泄所以㫖意未下滿朝紛然已先知之及聖㫖既下則與前所講若合符契臣初見嵩時適原任職方司郎中江冕稟事於嵩曰昨御史蔡樸㕘守備許實等失事本部覆本已具揭帖與東樓聞東樓已票送入未知如何東樓者世蕃之别號也嵩云小兒已票罰俸内分兩等甚有分曉皇上定是依擬臣初甚疑及後㫖下果如嵩言即臣所親見一事則其餘可知矣又前經歴沈鍊劾嵩皇上將本下大學士李本票擬本又熟軟庸鄙奔走嵩門下為嵩心腹感嵩之恩又畏嵩之威愴惶落魄莫知所措差人問世蕃如何票世蕃乃同趙文華擬票停當趙文華袖入遞與李本李本抄票封進此人所共知也即劾嵩之本世蕃猶得票擬則其餘又可知矣是嵩既以臣而竊君之權又以子而並己之權百官孰敢不服天下孰敢不畏故今京師有大丞相小丞相之謡又曰此時父子兩閣老他日一家盡獄囚葢深恨嵩父子並專權柄故耳此縱姦子之僭竊四大罪也邊事之廢壊皆原於功罪賞罰之不明嵩為輔臣宜明功罪以勵人心可也乃為壟斷之計先自貪冒軍功將欲令孫冒功於兩廣故先布置伊表姪歐陽必進為兩廣總督親家平江伯陳圭為兩廣總兵鄉親御史黄如桂為廣東巡按朋姦比黨朦朧凑合先將長孫嚴效忠冒兩廣奏㨗功陞所鎮撫又冒瓊州一人自斬七首級功造冊繳部效忠告病乃令次孫嚴鵠襲替鵠又告併前效忠七首級功加陞錦衣衞千戸今任職管事有武選司昃字十九號堂稿可查夫效忠與鵠皆世蕃子也隨任豢養未聞一日離家至軍門乳臭孩童亦豈能一人自斬七首級而假報軍功冒濫錦衣衞官爵以故歐陽必進得陞工部尚書陳圭告病回京得掌後府印信黄如桂得驟陞太僕寺少卿是嵩既竊皇上爵賞之權以官其子孫又以子孫之故陞遷其私黨此俑既作倣效成風蔣應奎等令子冒功打死發遣皆嵩有以倡之也夫均一冒功也在蔣應奎等貪冒科道則劾之在嵩貪冒人所共知科道乃不敢劾嵩積威足以箝天下之口可知矣此冐朝廷之軍功五大罪也逆賊仇鸞總兵甘肅為事革任嘉靖二十九年張達等陣亡正賊寇竊伺之時使嵩少有為國家之心選一賢將賊寇聞知豈敢輕犯京師世蕃乃受鸞銀三千兩威逼兵部薦為大將及鸞冒哈舟兒軍功世蕃亦得以此陞官廕子嵩父子彼時嘗自誇以為有薦鸞之功矣及鸞權日盛出嵩之上反欺侮於嵩故嵩嘗自嘆以為引虎遺患後又知皇上有疑鸞之心恐其敗露連累始不相合互相誹謗以泯初黨之跡以眩皇上之明然不知始而逆鸞之所以敢肆者恃有嵩在終而嵩與逆鸞之所以相反者知皇上有疑鸞之心故耳是勾賊背逆者鸞也而受賄引用鸞者則嵩與世蕃也使非嵩與世蕃則鸞安得起用雖有逆謀亦安得施乎進賢受上賞進不肖受顯戮嵩之罪惡又出鸞之上矣此引背逆之姦臣六大罪也嘉靖二十九年賊寇犯京深入失律歸路已絶我軍奮勇正好與之血戰一大機㑹也兵部尚書丁汝夔問計於嵩嵩宜力主剿戰以伸中國之威以紓皇上之憂可也乃曰京師與邊上不同邊上戰敗猶可掩飾此處戰敗皇上必知莫若按兵不動任賊搶足便自退回以故汝夔傳令不戰及皇上拿問汝夔求救於嵩嵩又曰雖是拿問我具揭帖維持可保無事葢恐汝夔招出真情故將此言啜哄以安其心汝夔亦恃嵩平日有回天手段故安心不辯及汝夔臨刑始知為嵩所誤乃大呼曰嚴嵩誤我矣此人所共知也是汝夔不出戰之故天下皆知為嵩主張特皇上不知之耳此誤國家之軍機七大罪也黜陟者人君之大權非臣下可得專且私也刑部郎中徐學詩以論劾嵩與世蕃革任為民矣嵩乃於嘉靖三十年考察京官之時恐嚇吏部將學詩兄中書舍人徐應豐罷黜荷䝉聖明洞察其姦將應豐留用夫應豐乃皇上供事内廷之臣嵩猶敢肆其報復之私則在内之臣遭其毒手者又何可勝數耶戸科都給事中厲汝進以論劾嵩與世蕃降為典史矣嵩於嘉靖二十九年考察外官之時逼嚇吏部將汝進罷黜夫汝進言官也縱言不當皇上既降其官矣其為典史則無過可指也嵩乃以私怨罷黜之則在外之臣被其中傷陷害者又何可勝數耶夫嵩為小人故善人君子多與之相反嵩不惟罷其官又且加之罪不惟罰及一身又且延及子弟以故善類為之一空此時計數正人君子能幾人哉是黜陟之權皇上持之以激勵天下之人心賊嵩竊之以中傷天下之善類此專黜陟之大柄八大罪也嵩既專權則府部之權皆撓於嵩而吏兵二部大利所在尤其所專主者於文武官之遷陞不論人之賢否惟論銀之多寡各官之任亦通不以報效皇上為心惟日以納賄賊嵩為事將官既納賄於嵩不得不剥削乎軍士所以軍士多至失所而邊方為甚有司既納賄於嵩不得不濫取於百姓所以百姓多至流離而北方之民為甚一人專權天下受害怨恨滿道含寃無伸人人思亂皆欲食嵩之肉皇上雖屢加撫䘏之恩豈足以當嵩殘虐之害若非皇上德澤之深祖宗立法之善天下之激變也久矣軍民之心既怨恨思亂如是臣恐天下之患不在徼外而在域中此失天下之人心九大罪也風俗之隆替係天下之治亂我朝風俗淳厚近古自逆瑾用事始為少變皇上即位以來躬行古道故風俗還古及嵩為輔臣諂諛以欺乎上貪汙以率其下通賄慇懃者雖貪如盜蹠而亦薦用奔競疎拙者雖亷如夷齊而亦罷黜一人貪戾天下成風守法度者以為固滯巧彌縫者以為有才勵亷介者以為矯激善奔走者以為練事卑汙成套牢不可破雖英雄豪傑亦入套中從古風俗之壊未有甚於此時者究其本源嵩先好利此天下所以皆尚乎貪嵩先好諛此天下所以皆尚乎諂源之不潔流何以清風俗不正而欲望天下之治得乎此壊天下之風俗十大罪也嵩有十大罪昭人耳目以皇上之聰明固若不知者何哉葢因皇上待臣下之心出於至誠賊嵩事皇上之姦入於至神以至神之姦而欺至誠之心無怪其墮於術中而不覺也臣再以嵩之五姦言之知皇上之意向者莫過於左右侍從之臣嵩欲托之以伺察聖意故先用寶賄結交情熟於皇上宫中一言一動一起一居雖嬉笑欷戲之聲遊觀宴樂之為無不報嵩知之每報必酬以重賞凡聖意所愛憎舉錯嵩皆預知故得以遂逢迎之巧以悦皇上之心皇上見嵩之所言所為盡合聖意葢先有人以通之也是皇上之左右皆賊嵩之間諜此其姦一也通政司納言之官嵩欲阻塞天下之言路故令乾兒子趙文華為通政司凡章奏到文華必將副本送嵩與世蕃先看三四日後方纔進呈本内情節嵩皆預知事少有干於嵩者即先有術以為之彌縫聞御史王宗茂劾嵩之本文華停留五日方上故嵩得以展轉摭飾其故是皇上之納言乃賊嵩之攔路犬此其姦二也嵩既内外彌縫周密所畏者厰衞衙門緝訪之也嵩則令子世蕃將厰衞官籠絡强迫結為兒女親家夫既與之親雖有忠直之士孰無親戚之情於賊嵩之姦惡又豈忍緝訪發露不然嵩籍江西去京四千餘里乃結親於此勢屬不便欲何為哉不過假婚姻之好以遂其掩飾之計耳皇上試問嵩之諸孫所娶者誰氏之女便可見矣是皇上之爪牙乃賊嵩之𤓰葛此其姦三也厰衞既為之親所畏者科道言之也嵩恐其奏劾故於科道之初選非出自門下者不得與中書行人之選知縣推官非通賄門下者不得與行取之列考選之時又擇熟輭圓融出自門下者方補科道苟少有忠鯁節義之氣者必置之部屬南京使知其罪而不得言言之而亦不真既選之後或入拜則留其飲酒或出差則為之餞贐或心有所愛憎則唆之舉劾為嵩使令至五六年無所建白便陞京堂方面夫既受嵩之恩又附嵩且有效驗孰肯言彼之過乎其雖有一二感皇上之恩而欲言者又畏同類泄露孤立而不敢言而嵩門下之人每張大嵩之聲勢隂阻其敢諫之氣以故科道諸臣寧忍於負皇上而不敢忤於權臣也是皇上之耳目皆賊嵩之奴僕此其姦四也科道雖籠絡停當而部官有如徐學詩之類者亦可懼也嵩又令子世蕃將各部官之有才望者俱網羅門下或援之鄉里或托之親識或結為兄弟或招為門客凡部中有事欲行者先報世蕃知故嵩得預為之擺布各官少有怨望者亦先報世蕃知故嵩得早為之斥逐連絡蟠結深根固蒂合為一黨互相倚附各部堂司大半皆嵩心腹之人皇上自思左右心腹之人果為誰乎此真可為流涕者也是皇上之臣工多賊嵩之心腹此其姦五也夫嵩之十罪賴此五姦以彌縫之識破嵩之五姦則其十罪立見噫嵩握重權諸臣順從固不足怪而大學士徐階負天下之重望荷皇上之知遇宜深抵力排為天下除賊可也乃畏嵩之巧足以肆其謗懼嵩之毒足以害其身寧鬱怏終日凡事惟聽命於嵩不敢持正少抗是雖為嵩積威所刼然於皇上亦不可謂之不負也階為次輔畏嵩之威亦不足怪以皇上聰明剛斷雖逆鸞隠惡無不悉知乃一向含容於嵩之顯惡固若不能知亦若不能去葢不過欲全大臣之體面姑優容之以待彼之自壊耳然不知國之有嵩猶苗之有莠城之有虎一日在位則為一日之害皇上何不忍割愛一賊臣顧忍百萬蒼生之塗炭乎况爾來疑皇上之見猜己有異離之心志如再賜優容姑待之恩恐致已前宰相之禍天下臣民皆知其萬萬不可也臣前諫阻馬市謫官邊方往返一萬五千餘里道途艱苦妻子流離宗族賤惡家業零落幸復今職方纔一月臣雖至愚非不知與時浮沉可圖報於他日而履危冒險攻難去之臣徒言取禍難成僥倖萬一之功哉顧皇上既以再生之恩賜臣臣安忍不捨再生之身以報皇上况臣狂直之性生於天而不可變忠義之心痒於中而不可忍每恨壊天下之事者惟逆鸞與嵩鸞已殛死獨嵩尚在嵩之姦惡又倍於鸞將來為禍更甚使舎此不言再無可以報皇上者臣如不言又再有誰人敢言乎伏望皇上聽臣之言察嵩之姦羣臣於嵩畏威懐恩固不必問也皇上或問二王令其面陳嵩惡或詢諸閣臣諭以勿畏嵩威如果的實重則置以專權重罪以正國法輕則諭以致仕歸家以全國體則内賊既去朝政可清矣將見賊寇前既聞逆鸞之死今又聞賊嵩之誅必畏皇上之聖斷知中國之有人將不戰而奪其氣聞風而喪其膽况賊臣既去豪傑必出功賞既明軍威自振如或再寇用間設伏决一死戰雖繫諳達之頸梟濟囊之頭臣敢許其特易易耳外賊何憂其不除賊患何憂其不絶乎内賊既去外賊既除其致天下之太平何有故臣欲捨死圖報而必以討賊臣為急也然除外賊者臣等之責而去内賊者則皇上之事臣感皇上知遇之厚不忍負荷皇上再生之恩不能忘感激無地故不避萬死為此具本親齎謹奏奉聖㫖這厮因謫官懐怨摭拾浮言恣肆凟奏本内引二王為詞是何主意著錦衣衞拿送鎮撫司好生打著究問明白來説附張宜人請代夫死疏刑部見監楊繼盛妻張氏謹奏為籲天乞恩願代夫死事臣夫原任兵部武選司員外郎因先任本部車駕諫阻馬市預伐仇鸞逆謀聖恩僅從薄謫旋因鸞敗首賜湔洗一歳四遷歴抵前職臣夫拜命之後銜恩感泣思圖報效或中夜起立或對食忘餐臣所親見不意誤聞市井之談尚狃書生之習遂發狂論委的一時昏昧復荷皇上天髙地厚之恩不即加誅俾從吏議臣夫自杖後入獄死而復甦者數次剜去臀肉兩片斷落腿筋二條膿血流約五六十碗渾身衣服盡皆霑汙日夜籠㭱備極苦楚又年荒家貧常不能給止臣紡績織履供給餉食已經三年該部兩次奏請俱䝉特允監候是臣夫再蹈於死而皇上累置之生臣之感佩惟有焚香禱祝萬壽無疆而已但聞今嵗多官㑹議適與張經一同奏請題奉欽依依律處決臣夫雖復捐脰市曹亦將瞑目地下臣仰惟皇上方頥養冲和保合元氣昆蟲草木皆欲得所豈惜一迴宸顧下垂覆盆倘䝉鑒臣螻蟻之私少從末減不勝大幸若以罪重不赦願即將臣斬首都市以代臣夫之死夫雖逺禦魑魅親執戈矛必能為疆場效命之鬼以報皇上臣於九泉稍有知識亦復銜結無既矣臣無任激切祈懇惶悚待命之至奏入為嵩所抑不得達遂被害楊忠愍集巻一
