body:
  text: 楊忠愍集巻二明楊繼盛撰序壽韓苑翁尊師老先生七十一序君子之壽天下之治亂斯道之廢興攸係必天有意於斯世斯道之治且興也而後畀之以有永而不窮然畀於有位者或限其時而不及為明道之事畀於志學者或限其位而不得與夫行道之責則其所係者亦偏焉矣惟我苑翁老先生之壽天下之治斯道之興恒必賴之謂天以全壽畀之也非歟葢君子所貴乎壽者非徒自壽己也為其能壽天下也能壽斯道也苟無補於治與道將焉用壽是故凡厥有位孰無治理之責然志存經濟者或奪於位之弗久而趨時固寵者又終其身而無濟於天下之事其何補於治也惟天純佑篤生先生天地忠誠渾厚之氣悉萃之矣其以天下為己任也越在内服弼亮率下越在外服綏民迪功越在翰苑文章範俗越在邊鎮强藩恬服勍敵懾畏斯固載在史冊昭人耳目天下之所賴以為治者其在今日撫守南都又能操持其紀綱而鎮撫其百姓天下之根本以固宗社之靈運以培南服以靖四方亦因之以寧矣行將經綸燮理之任屬之則所以係天下之重者何如也我國家道學之綂自薛文清諸大儒出講明正學後先相望斯道之興也久矣自是而明道學者或口談性命之言而身冒貪汙之行或外飾温厚嚴肅之貌而中藏毒忌闇濁之心或始而卓越峻潔凜不可犯終而喪其所守流於汙下而不羞者則其所學不過欺世之機械釣名之筌蹄耳不知有得於道焉否也先生以純篤之資果確之志葢自弱冠時即有志性理之學其學之原則以精一為宗其學之要則以培養夜氣為本其學之實則見於拾遺意見經緯志樂六經説諸書當其晩年天又假之以南都清逸之地使得優游暇豫沉潛道真平生事業至此盡收拾而大成之一時論得道學之正脈者皆以先生為首稱則所以係斯道之重者何如也是葢天欲永天下之治於不替故不得不壽先生以久其施天欲啟斯道之傳於不絶故不得不壽先生以要其成而大其所至始而以先生係天下斯道之重故為天下斯道而壽先生之身終而以天下斯道係於先生之身故必壽先生而藉以壽天下斯道之大則所以畀之者固為不偶然先生之致治而其道行則有以壽天下之命脈闡學而其道明則有以壽斯道之命脈其所以仰答上天畀壽之心者又豈小補云乎哉士大夫之壽先生者舉忻忻然曰苑翁年雖七十有一然精神凝固丰采爍然步履强健視少年無以異也期頥之域可必至矣夫以是而壽焉未足以盡之也先生之壽可以年數拘哉天下之治垂之千萬年而無斁則先生之壽與治俱矣斯道之綂傳之千萬世而無窮則先生之壽與道俱矣故謂先生之壽為天下之壽可也為斯道之壽可也謂天下斯道之壽即先生之壽亦可也不將與天地同乎故曰天以全壽畀先生盛叨門下既幸先生及天下斯道之壽又幸其將來自壽之有地也於是拜首稽首忻躍謹書壽徐少湖翁師文君子之壽當圖不朽之真而所以壽之者貴有懇懇相勉惓惓相成之義瑣瑣年數之末頌祝之私皆所不取也世之言壽者不過曰享年有永而已然命稟自然固一定不易年嵗自積於人之賢不肖無與焉若以此為壽則夫簾肆堀巖翁伯張里哆顣㝠蠢懐殘秉賊者龎皓威㽔不可勝數且多不踰百年耳過此以往即絶景吞響煙滅無聞雖謂之不壽亦可也惟夫修諸己者道德卓犖建諸用者勲業赫耀垂諸後者典謨暐曄則邈無紀極可與天地相終始夫是之謂不朽而壽之所以為真也今夫言壽之至者莫天地若然天地之所以為壽者非謂其形體不毁已也以覆載之德生成之功無聲無臭之教足以父母萬物無窮耳否則亦㝠然翕聚之氣塊然凝結之質而已非所以悠久無疆億載不朽者也是故人知壽於年者為壽而不知壽於理者斯壽之真知壽於身者為壽而不知壽於天下者斯壽之大知壽於目前者為壽而不知壽於身後者斯壽之永非深達始終之故善權脩短之算者孰能論壽於命數之外而不求壽於年數之間乎恭惟我夫子黄閣元老黒頭相公以年言之似尚未可以壽之者然觀諸所修為者所建立者所垂後者半生積累己足垂萬年不朽視世之昏耄罔生無所寄付者脩短之相絶也亦猶蕭艾夕枯之與松柏久茂也榮辱之相背也亦猶衣赭輿臺之與危軒華衮也已不可同年語况由此而進焉其所為不朽者當益宏逺峻懋謂不可以壽之乎昔丙午嵗二三子稱壽於三槐堂嘗記夫子舉爵為令曰太上立德其次立功其次立言其次言壽再令曰立德要知似德之非立功要知貪功之戒立言要知尚口之窮言壽要知罔生之辱夫德壽之基也功壽之輿也言壽之華也即樽酒教令之間而不朽之道備矣然三者見其始而未見其終著其端而未究其極則誠門弟子之深懼繼自今上之果能永肩一德不惕威改節以悦俗固寵次之果能以身殉國事專報主建掀揭非常之功次之果能崇正論主國是排邪議黜枝葉有格非反經垂教範世之益終之能居之以恒至老不變不先貞後黷蹈所謂似德貪功尚口罔生之愆則可以輝名崑鼎勒伐金冊三者垂萬年不朽壽即享萬年不窮而瑣瑣年數之末誠不足言矣使或較齡算之短長畧行誼之臧否急一身之利害視天下之治亂若秦越然則已往之行隳於垂成將來之年俱為虚假斯不善自壽者之為固知夫子必不爾為也噫夫子以一身任天下之重則所以圖不朽者不得不持之以有終天以天下之責付於夫子之身則所以壽平格者不得不錫之以有永又何俟門弟子瑣瑣勸勉頌祝之乎哉苑洛先生志樂序世之談經學者必稱六經然五經各有專業而樂則滅絶無傳論治法者必對舉禮樂然議禮者於天秩不易之外猶深求立異可喜之説至於樂則廢棄不講全德之微風俗之敝恒必由之良可悲夫然律吕與天地相為終始方其隠而未彰也天既生哲人以作之則于其既晦也天忍任其湮没已乎闡明之責葢必有所寄者先生自做秀才時便抱古樂散亡之憂當其嵗試藩司聞諸督學虎谷王公云律吕之學今雖失傳然作之者既出於古人則在人亦無不可知之理特未有好古者究心焉耳先生於是惕然省悟退而博極羣書凡涉於樂者無不㕘考其好之之專雖發疽尋愈不知也既而得其説矣於是有直解之作然作用之實未之悉也自是苦心精思或脱悟於載籍之舊或神㑹於心得之精或見是於羣非之中若天有以啟其衷者終而觀其深矣於是有志樂之作曰志云者先生自謙之辭也非徒志而已也是故律生聲鐘生律馬遷著之矣而律經聲緯之遞變體十用九之明示則未之及也圍九分積八百一十分班固著之矣而管員分方旋宫環轉乗除規圓之圖則未之及也六十調八十四聲蔡子著之矣而起調則例及正變全半子倍之交用調均首末長短相生之互見則未之及也六變八變九變之用周禮載之矣而以黄鍾祀天神以㽔賔祭地祇以太簇享人鬼一造化之自然以黄鍾一均之備布之於朝廷宫闈實古今之絶唱則又有出乎周禮之外者也宏綱細目一節萬變信手拈來觸處皆合樂之為道盡於是矣志云乎哉其於先儒世儒之圖論備録不遺者是固先生與善之心然亦欲學者考見得失焉耳方其始刻之日九鶴飛舞先生之庭者久之識者以為是書感通所致觀仰沫出聽之説則鶴之來舞也固宜而其得樂之正也此非其明驗矣乎昔人謂黄帝制律吕與伏羲畫卦大禹叙疇同功然卦疇得程朱數子而始著律吕得先生是書而始明則其功當不在數子下豈曰小補云乎嗚呼太和在成化宇宙間故先生所由生太和在𢎞治宇宙間故是書所由始太和在嘉靖宇宙間故是書所由成則其作誠不偶然也後之有志於樂者苟能講求而舉行之則太和將在萬世之宇宙而先生之功至是為益大矣然不苦心以求之何以知是書之正不得其説而精之又何以知盛之言不為阿私也哉噫盛不敏雖學之而未能也講求之責深有望於同志君子云送張龍翁老先生拜相序嘉靖己酉嵗春二月我龍翁老先生自南都冢宰拜禮部尚書兼文淵閣大學士先時隂雨彌旬可厭迎命之時倐爾澄霽萬里一色若造化有以示其機者士女觀者無智愚大小皆以朝廷得相為慶天人之交與何昭昭也盛等奔走稱賀先生乃戚然言曰惟予無良承茲大命深貽無窮之憂將焉用賀二三子惑咸相謂曰君子之仕也不得於君則憂不得行其所學則憂不得立大功於天地間則憂乃今三者則俱得之矣不知先生之憂也何故及退而思之然後喟然歎曰先生之憂其國家之福乎葢天下之事每成於憂而敗於喜夫喜則縱縱則視天下之事皆易也而忽心生憂則畏畏則視天下之事皆難也而慎心生慎忽之間天下之治亂攸繫甚矣人臣不可一念之不憂也然憂有一己之憂有天下之憂夫憂以一己則其憂也私患得患失將至於終其身而不可解憂以天下則其憂也公雖身膺無窮之慮而天下之至可樂者隨之公私之際憂樂分焉不可不辨也先生自做秀才時已有先憂後樂之志則夫身任天下之責其憂固有所不容己者况夫事之阻滯難處者又無有紀極乎是故或係天下之根本或係國家之安危或係正學之廢興或係世道之升降或係綱常之修墜或係風俗之盛衰凡臣子所不忍言者更僕未易數正賈誼所謂可為痛哭流涕者也此而安常處順則亦可以自樂矣必欲殫智畢力整頓振作使氣運景象一如國初宇宙間不亦難乎則夫其始也以天下之憂為己之憂其既也以己之憂與天下之憂國者共其終也至於天下無可憂之事而己之憂亦因之以釋是固先生所以行道立功先憂後樂之心而天人之所以交與乎先生者此也謂非國家之福乎盛等叨門下其憂樂之情常相闗故惟述其所以先憂者如此若夫歌詠頌美之辭固有待於天下既樂之後也豈敢預贅左右以啟其矜喜之端哉集張節婦冊葉詩文序成天下之事功易立天下之節義難語節義之難者又莫難於婦人之所守夫人固多事功懋峻赫炫照耀一世者然或出於遭際輳合矯激騁術以濟其所為斯固遇之至順凡有中人之才者皆可能之裕如也至於當天下之至變而能氣如雷霆立如山嶽雖窘辱頓挫生死利害交於前而不可少動則非見足以定守足以確力量足以擔當負荷者鮮不仆矣然又出于一時義氣激發所致初無俟於持久操守之難使歴之以終身又未知不變否也惟夫婦人之守節則撫而幼孤振而先業隂柔之身百責所萃其負荷之難如此内無所藉外無所資㷀然獨立狼狽無依其植立之難如此斯須檢㸃之或疎則羣議紛然而起凜凜焉戒慎避嫌之心自少至老一時不敢少懈則必有聖人之資聖學之功者始足以守之而不渝其操存之難又如此則視丈夫之成事功立節義者難易何如也是婦人之所守不為天下之至難者歟臨洮張婦王氏之守節其艱苦萬狀雖不可以盡述然觀諸張子免溪之狀王子渼陂之傳許子少華之表則其負荷其植立其操存又不為婦人守節中之至難至難者歟其上而朝廷旌表之下而諸君子歌詠歎賞之固足以彰激勸風俗之典亦足以見良心不死之機矣然節義在婦人者郡縣俱有之而節義在丈夫者天下固不多見節義之難者婦人盡之無少歉而節義之易者丈夫固反虧之豈非光岳氣分天地山川精粹之氣不萃於男子而盡萃於婦人之身乎無亦朝廷於忠義者之不奬奸悖者之不誅此天下之所以無懼而勸也乎噫古人之節義少損者後之功業足以贖之今之人不惟節義之掃地又足以壊天下之事古人之同於婦人者己為可恥今之人其所為所行反婦人之不如予於此重為感且媿矣諸君子其毋徒歌詠婦人也乎引題兩洲王老先生誥命咨引惟二十有八年春我兩洲翁以南京禮部尚書三載考最帝曰都哉朕嘉乃丕績㑹南京吏部尚書缺僉議請以翁代帝曰俞哉時克綂朕百官暨冢宰論翁最以當進階誥贈推恩三代請帝曰欽哉惟時宜叙乃功爰進翁階為資政大夫贈先淑人為夫人贈乃祖乃父如翁官妣及祖妣如先夫人秩葢聖天子知翁甚深任翁甚專而眷翁甚隆也及咨命寵頒翁感躍無己遂載諸軸題曰隆恩命盛贅言於末盛於翁為門下士義無容辭者乃拜手稽首颺言曰於乎翁之此舉其忠孝兼至矣乎然謂翁之忠者以昭君賜也謂翁之孝者以彰先德也乃翁之意則欲持此以為不忘其君親之具而教天下以忠孝之機夫豈人之所能識哉葢人臣非不能報君之患而不敢忘君之難夫人子孫能顯其親者何限而不忍忘之者葢鮮矣臣而至於一念之忘其君子至於一念之忘其親則其所以報之顯之者未知有得于忠孝否耶惟天純佑我國家故賚翁為之臣惟天眷王氏之世德故畀翁為之後則翁之一身固忠孝之管也是故唯翁之忠在朝著唯翁之孝在家庭唯翁忠孝之實在史冊斯固夫人之所共知者其在今日之膺榮命而必軸以懸之朝夕在目是不可以識翁忠孝之心哉翁之心不以一念而忘其君親者也而猶寄其識於誥贈之典者葢欲其覩綸音之重若日對越乎君視贈秩之崇即先人之常如有見耳夫日如對越乎君則思所以報之者自不容一時之或弛先人常如有見則體祖父承恩欲報之心而殫智畢力代之以仰答者自不容一時之少懈是則翁之所以不忘其君與親之心也雖然必俟有所感觸而後不忘則其為忠孝也亦有間矣翁之忠孝出于天性而其所以不忘者夫豈有待於此抑亦假之以表率百官垂訓子孫焉耳是故使子孫百官有所感而不忘其君則所以報之者為無窮而其忠即翁之忠有所感而不忘其親則所以顯之者為無窮而其孝即翁之孝推而萬世臣子知所以報之顯之者皆翁之不忘者起之又非即翁之忠孝矣乎是則翁之所以教天下以忠孝之心也夫既盡其己之心又推諸人而使各知所以自盡則謂翁之忠孝為兼至也非歟噫體翁之心者是又在翁之子孫及厥百官而已盛雖不敏誠願與賢后昆暨羣屬共勉焉而後之觀者亦將有所感夫望雲思親圖引人子愛親之心存於中而不可解然後思親之心隨所在而不能忘世之言孝者不過曰含菽緼絮致滋美勤定省秪服厥事而已然朝夕在側固其情之不得不然而少知天性之愛者皆可以為之易易耳乃若逺從王事時當慕君非真有愛親之心其孰能不遷且忘乎齊人孫子以儒行充獄掾予以排奸繫獄孫子常侍左右一言及厥母即垂涕飲泣其憂戚思慕之情藹如也今即三年矣每言及之其涕泣憂思之情如初予因此一節甚重之鄉友米子華乃原仁傑故事繪望雲思親圖贈之椒山子為之引曰孫子之愛親如此可謂孝矣然孝之道尚有進于此者夫人之一身於親則謂之子於君則謂之臣均之無所逃焉者也然方其事君也鮮有不忘其親及其事親也又鮮有不忘其君者是忠於君而孝衰孝於親而忠廢又焉得謂之忠與孝乎孫子今日之事君既知所以不忘其親矣則夫他日歸而事親也顧可以忘其君乎其事君而思親也歸而養之孝不可以不篤矣則夫他日事親而思君也起而官之忠惡可以不至乎是故孝能忠於君者孝之全也忠能顯其親者孝之大也此愛親之道視諸望雲而思者何如耶噫臣子之事君親惟在乎一心而已心苟在乎君親則鞠躬盡瘁固忠也逃跡山林亦忠也舉足不忘固孝也不得已而至於忘之亦孝也不然則致赫炫之業者君子謂之負君聚百順以事者君子亦謂之不肖子况屑屑於聲色之末觀美之具乎孫子歸而質之鄉士大夫其愛親之道諒又必有進于此者當反而告予可也劉司獄承恩圖引風雨霜露皆上天生物之仁而雨露之恩為最渥爵賞刑罰皆人君惠臣之典而爵賞之恩為尤厚古之人臣雖刑罰之加猶且感其曲成之愛而圖報之思無窮况夫爵賞之施所以行吾之志而厚吾之生者其報禮之重當何如也世之為臣者以彌縫為要位之機械以阿諛為固寵之筌蹄方日幸其已術之能中豈知其恩惠之在君是故圖報之心輕以疎而盡忠於君者葢鮮嗚呼臣道之不見於天下也久矣孰謂不敢忘君之恩乃有如司獄劉子乎劉子闗中人以儒行起刀筆官于刑曹方予以排奸被杖繫獄適劉子治獄事日侍左右躬湯藥進飲食徬徨奔走於其間故予得僥倖不死者劉子維持保䕶之功居多甲寅嵗以三載考最得膺勅命乃感激繪圖誌不忘焉椒山子為之引曰為臣不忠於君凡以不知君恩之重起之也葢人臣一登仕版則此身已屬於君其宫室服食之美車馬妾御之奉父祖妻子之榮無一而非君惠之所及則恩同于天葢有如雨露之至渥者苟少思其君之所惠必將以心攄君以身殉國匡輔君德弼成王業鞠躬盡瘁朝夕不遑矣帷其受君恩而不知則視君於己君不相屬者欲其盡忠也不亦難乎劉子以承恩繪圖可謂知感君恩而不忘矣然錫予有大小皆人君爵賞之恩官秩有崇卑皆可以盡其職而重其報而司獄民命所係又於報君為最切則夫仁以宅心亷以律已勤以趨事誠以御物以求仰答君恩之重端於劉子有望焉否則急身圖則汙輕民命則殘事矯激則怪尚煩瑣則迂謂之棄恩負君而所謂繪圖之意亦虚矣噫舒慘並行者上天生物之常也寵辱迭用者人君御世之權也人臣欲不忘爵賞之恩請自不忘刑罰之恩始跋跋冀梅軒留朱子語畧後卜子曰仕而優則學學而優則仕仕學一道也但世之學者皆溺於詞章之末或優而仕也亦利禄而已爾世之仕者皆急於刑名兵賦之圖或優而學也亦技藝而已爾未仕之前其學已如彼既仕之後其學又如此道學之不明也久矣何幸於梅軒有望乎冀子梅軒方其學也無非身心性命之懿及其仕也無非為國為民之要則仕豈世之所謂仕學豈世之所謂學乎其提牢一月祛獄弊恤獄囚疏獄滯嚴獄防罔不竭盡心力或少餘暇則讀書不輟其所讀者又皆身心性命之典於事竣乃以朱子語畧留於秋官别署噫觀提牢之政則梅軒之仕可知已觀此書之留則梅軒之學可知已道學之不明也久矣何幸於梅軒有望乎説介軒説介安從生生於吾心之義義又安從始始於在天之利是故本諸心而原諸天非由外鑠者也夫人之所以植綱常𢎞德業參天地匹聖賢皆賴此以為之質幹是可苟焉已乎必剛與亷二者合而介始成矣然乖愎以忤物則似介之剛而非剛矯情以駭俗則似介之亷而非亷毫釐千里不可不察也而世之號為介者乃不求其合於天而求其合於人不求諸吾心而求聲音笑貌之末故能介於外者或不能介於内能介于始者或不能介於終則似介非介不過欺世之機械要寵之筌蹄耳其害介也不既深乎觀李封君之介自心而身而家而鄉其介之操同自少而壯而老其介之操又同夫固合内外始終而一之者謂之天下之至介非歟則以之名軒也固宜論者猶以封君之介不及於天下惜之然述之者有司寇禹江則天下之頌其介也固有待矣噫不苟和之謂介然介而不和者偏也不苟取之謂介苟有意取名焉雖非貨利亦謂之取矣敢以是足介説之義記記開煤山臨洮八十里鎖林峽有煤山二區焉一在峽之西一在地竺寺前先是開者數為番民所阻有司至不能制予以諫開焉市謫官狄道尋欲開之而不敢專也㑹庠生張子汝言自於府縣允之委府相陳言往董其事乃畨民阻之又如昔予遂偕揮使李子節門人李維芳陳恂宋誥親往治之至則先懾之以威次惠之以賞由是煤利以開畨民遂服予不喜煤利之開而喜畨民之服也遂記之書與繼津年兄書承問足見兄為國之忠樂善之誠弟不當阻抑之以隳其向上之志但愚衷有見其不便者數條請上陳之備採納焉此事部中允行而人皆避事葢難其人而兄獨勇往任之則為衆悦服今本部既束髙閣而兄欲强行則堂官惡之同僚忌之此不便一也兄為拯援小弟之故讎家欲害而無由乃今自尋事幹是自居受害之淵藪此不便二也弟訪問宣大將官俱云地方狼狽已極兵馬必難整飭所謂雖有善者無如之何兄欲任之萬無成功之理昨何道長慨然有開海運之請一無成功人皆笑之此不便三也到彼處行事凡有謀為必先題請兄自忖當道者果欣而允之乎抑或故阻其所為乎此不便四也許公之請必欲其駐劄陽和城兄無兵馬之寄一遇有警軍將各守信地遺一空城賊或逼圍將何以為保身家之策此不便五也整飭兵馬責任甚重萬一失事其責當與將領督撫等兄自忖其當道者肯恕兄乎抑必加重於兄乎此不便六也細觀許多之疏葢恐一時失事兵部㕘劾故扯兵部官在内將欲謝擔於兵部衙門且又云責令容彼提調則若彼之屬官者勢機在彼持握豈得自專行事無事之日受彼提制有事之日替彼頂缸成功難必禍害預知此不便七也夫識時勢者在俊傑此等時勢兄識之久矣而必欲為此者葢一念為國之誠故利害有所不暇顧耳然欲幹天下之事當思如何下手如何收煞事成如何結果不成落何名目死生雖不計畢竟果不徒死否思之思之又重思之弟非阻兄忠貞之為若損友者葢真見事必不可成故耳况此時兄十分小心迴避猶恐禍及何乃自投禍機乎情出迫切不覺涕泣之道直述其事詞意不倫幸惟情亮又仰讀手教足見兄以天下為已任敬羨敬羨宣大係天下安危弟豈不知使弟在部必為兄之所為者乃阻抑若此者何葢以兄處最嫌疑之故耳况老賊報復害人之巧入于至神者乎此弟之所甚慮而知已溺愛迫切之情如何能已此事在他人為之如何不可而在兄為之則甚不可兄才尚有大展時節此時且斂鋒蓄鋭俟時可為則轟烈一場勿徒惟盡其心而不計事之成否人皆知致身為忠不知為天下愛其身尤為忠之大者請兄更思上徐少湖翁師救荒愚見某既以言得罪宜絶口不言天下事但聞窮民病苦之狀若割心肺日夜憂思至廢寢食故有欲黙而不容忍者而夫子抱能受言之量居能行言之位而某極荷相知又有可言之機寧容隠乎謹陳救荒愚見伏請尊裁城中餓􅥌死亡滿道人人驚惶似非太平景象夫京師之民各有身役常業何以頓至於死而所死者皆外郡就食之人也葢縁各處司民牧者無救荒之策之心而京師有捨米捨飯減價賣米之惠故皆聞風而來當其事者又不肯盡心鮮有實惠故每凍餓以至於死是以京師為溝壑誘外郡之民而填之也救荒自有均平普徧之政何必煦煦然為此小惠誘民以至於死乎莫若行令各處撫按有司作急賑濟然後出給告示諭以本處賑濟之故使各歸鄉里又將所捨之米預支二三十日以為回家盤費之資則窮民有鄉井飽食之樂京師無死亡道路之慘矣連年豐稔止有此嵗之艱一郡之粟自足以供一郡之食特在上者區處之無其道耳官倉之粟可賑濟也亦可價賣也富室之粟可勸借也亦可責令減價糶也葢官倉除備邊急𦂳不可動支外其餘有積至數十年將腐者合暫變賣收價到秋易新似為兩便富室有積粟至千萬石者皆坐索髙價以邀重利故米價至于騰踊合依少定價裁抑之又當以禮奬勸借官給以帖到秋償還則米價自可日減窮民自返故鄉矣窮民既無處辦米或賣産傭工止可得錢今乃分為等類定為價數則錢法紛亂而民益告病矣夫錢法之行也或朝貴而暮賤或此處用而彼處不用若有神以使之雖市人亦不知其所以然也其可以官法定之乎為今之計當為權宜之術不分等類不問大小俱責令折算通行其價數之多寡任從民便官府不得而與焉則錢法可通而商民俱便矣米價騰踊日甚一日今定為官價似為裁抑之術然在京師則有所不能行者葢各舖戸之米俱貴價糴買非若外郡富家田内自穫然今定為輕價彼豈肯折本糶賣且各處販米者一聞價輕孰肯再來外米不肯來内米不肯糶不知其將來至於何如也如定米價亦俟春間販米至者多然後議之北地既荒全賴南米之來使河道阻滯則來者延遲恐緩不濟事賊盜甚多或搶掠一船則後者聞風孰肯再來今宜行令各河道官使開河之時先放米船行一遇壅塞則遣官夫拽運一若轉運官糧然則米正月終可到矣又行令各處地方官使嚴加巡捕防守䕶送則販者無失米之憂所來者必多矣南米來者既多又憂米價之不減乎盜生於貧雖勢所必至然荒年而至於盜起斯亦可憂矣聞各處撫按分付各屬官今且暫寛治盜之法其意懼生變也以故各官於賊盜之獲俱姑息寛縱之此端一開為盜者衆貧者日至放肆富者日不安生是民之為盜雖起於年凶亦上之人有以教之耳夫濟荒自有長策未聞教民為盜以救之也况漸不可長民不可逞恐隄防一徹紀綱遂壊其變有不可勝言者宜行令各處撫按有司使遇賊盜仍治之如法則禁盜乃所以止盜而止盜正乃所以救荒也與少司寇吉陽何公書何公四札係先生遺筆原集未載今補刻敝鄉人劉大使便曽具小啟想已達左右矣得勅命後即告病山居涵養數年然後出而幹事此弟定志也不意方投文書即有此轉聞命驚惶若有所失以未成之學疎直之性進則有敗壊之凶退則有避事之罪天不成就用之太早幾非在我奈之何哉連日與二三相知講求出處之道議論紛紜莫知折衷請為吾兄陳之或告弟曰方今之世和光同塵可以免禍以子所為禍定不免與其得罪於人隂受不測之禍孰若出位建白直言時弊死則為鐵脊之鬼生則為田野之人以圖不朽以求不忝所生不亦可乎此一説也或告之曰天下之事尚有可為與其愚直以取重禍莫若上疏自獻收豪傑募死士行邊疆圖方畧相機審勢與賊決一死戰以報蒼生殺擄之讎以雪朝廷城下之恥不亦可乎此一説也或告之曰位卑而言髙罪也力小而任重仆也莫若盡其見在之職不為出位之思俟權到手得行其志然後斬奸賊之首梟賊寇之頭不亦可乎此又一說也即此三説證諸本體莫知取舍學問至此莫知究竟萬望尋便速賜指教以為弟行止依歸甚幸甚幸弟自到家養靜工夫不敢放下其處己接人視前次亦差缺二字昨過易州登太寧諸山乳泉諸洞遊覽之暇檢㸃前後似若少進但一入京師目前世情人物俱見可惡若不可一朝居者極知此是病痛常自寛假然此根終排遣不去不知吾兄將何以教之乎此時此際真若自天堂而墮於地獄由仙侣而降為衆生寅入酉出日幹瑣事回思南都不覺痛哭流涕至忙迫中不及詳告綂容鄙布不盡其外紈扇之約弟赴京之遲兄舉事之早故坐失約然都下之品題不外於前日之相議者也拱候大政報成奉賀不具仲春念八日得華劄季春望日生盛頓首覆又違教渴思非言可盡南遊已久歸來風土反不能習日食麵椒夜卧熱匟痰火盛發遍體熱瘡兩耳壅塞四肢麻木卧牀月餘方少愈而家叔病故貧不能葬凡百惟弟承當故臘月赴京之行不果意圖考滿得敕命後即卧病不出未知竟能遂否也自抵家惟居野邨春來病少差日與舊㑹友數十人講舉子業㑹文之中因寓性命之談初若不相入邇來則浸浸然動矣敝縣大尹亦時入講一時士風若為興起弟學綿力薄不能日新良用為懼也别時分付事弟未入京無以應命今年大事南都士夫俱相慶得人吾兄一生之道德功名皆於此事定之可不慎乎則夫知仁勇三者不可不朝夕體貼也去秋上龍湖翁小啟啟末云有一時之富貴有萬世之事功有目前之榮辱有身後之褒貶不惟以義言之其輕重分明雖以利言之其輕重亦較然可懼也審幾定趨是在老先生嵗暮亦以此告少湖翁若為見刖敢不揣僭妄再為負宰相之望者獻之可乎一代宗道專望吾兄主張不可不憂勤惕厲也回瞻雅㑹領教無由仙凡懸隔曷勝仰戀鄉人劉大使便謹此代候匆匆不盡欲言統惟鑒諒新春二十七日生盛頓首拜具又别時辱教言諄諄切于骨髓弟以愚疎謀為拙謬自貽顛躓負教甚深圜上二年仰托雲庇居食如常身心寧靜患難缺二字若有所得是前日相講之學乃今日受用之處也所苦者危疑孑立日伍囚徒一㸃生機不見長進恐終為鐵脊漢而已便中望賜教萬萬此時此際生死未卜誌表之託兄與淡泉諾之矣不知肯不負否也有懐如海萬難悉一綂惟鑒諒不盡仲冬念二日弟盛頓首謹狀又弟足初屈不能伸今夏一場傷寒則全愈矣且身體勁健異于昔日承諸同志周給不惟用度充足且置田百餘畆可以供給無窮今秋人田俱潦獨弟田獲收六七十石人以為神云是弟坐監反勝做官多矣兩箇犬子一十嵗一六歳新開䝉讀書俱聰敏可望賤累輩俱喫齋日誦道經祈弟平安弟禁之不止亦任之而已十嵗子已省人事與弟婦經理家務内外嚴肅弟可無内顧之憂謹瑣瑣告説以紓吾兄愛弟之慮老賊千方百計必欲置弟於死賴聖明還有主張今秋朝審賊輩以裕府差人送飯打路之説騰播中外亦聞主上幸聖明不究其事此時弟甚危矣豈惟弟危雖裕府亦恐不利也自大廓老去後弟缺三字無憂矣辭陜西巡按劉取書院帖辭按院二帖原集未載今補刻臨洮府狄道縣典史楊繼盛上言職官居首領分在鄙賤每于吏事之委即趨赴不敢辭况䝉本院按部鞏昌禮取書院教兩府生員夫以卑賤之官付以尊重之任是雖優處之典實篤年誼之情苟非木石自當知感豈敢遲緩惹罪不便苐以學疎行簡既不足以語師道之尊嚴而事有牽繫於心又有甚不可忘者念職之及門受業五十餘人日相切劘情意相孚此時不忍遽離且買山一區造書院數間尚未落成此時功虧未免廢棄又買贍學山地一千六百餘畆一以供給諸生一以教民農桑此時不治未免荒蕪縣舊無社學已買基址尚未修建儒童三百餘人尚在寺讀書此時中止未免散去其分理縣政尚有數事未曽就緒此時離任未免中廢凡此將成諸務一旦廢棄不無可惜切思臨洮鞏昌皆本院所按屬者也鞏昌有書院臨洮亦有肄業之所必顧取本職離任往教而不移臨洮生員於鞏昌莫若移鞏昌生員來學於臨洮使職在任兼教則既得以訓生徒又得以盡官職終其前事似為兩便瀆冒尊嚴死罪死罪嘉靖三十一年正月初六日再上辭帖職以卑賤之官本不足以當師道之重乃䝉憲牌誤取書院教兩府生員昨具帖辭不敢直言茲再䝉憲牌提取不得不直陳其情切惟召虞人以旌不至將殺之孔子取其非召不往庶人召之役則役召之往見則不見先儒釋以為往役者庶人之職不往見者士之禮豈非以禮義所在不可往且屈乎夫古之虞人庶人猶知守已之正職官雖卑賤其志肯甘虞庶下哉本院如召之以有司之事則固典史之職也職敢不以分自處乃拒上官之命今召之以教訓生徒則有師道存焉職又安敢不以禮自守乃淪於辱身枉道者之為苟謂職卑賤無可取也固宜踐踏之不足不當付以師道之重如謂庶幾可以充師任則固賔師之責也未聞欲延師者乃治之以官府套數之常今之師道不立久矣古之師道則可稽也或求諸市井或求諸山林或求諸草茅田野之間故雖古之明王必致敬盡禮後之霸主亦知卑禮厚幣凡以師道尊嚴不可挾勢位以屈之也本院有志書院是志欲行古道者欲行古道乃不能脱勢位之套而挾之憲牌提取若僕隸然一則曰毋得遲緩二則曰毋得遲緩是以典史召之也夫既以典史召之職敢不遵朝廷之謫命守典史之官職而乃為出位之往乎且古之設書院者專以講明道理今為書院計而挾勢位以延其師則所謂書院者不過利禄之淵藪功名之筌蹄耳其於斯道何所補哉故雖不為此亦可也職赴任以來其處上官僚友不敢一毫僭越今乃若與本院抗者非敢固傲取罪葢位之所在雖不敢踰而道之所在亦不可苟如以牌而取遵牌而往不惟取知道之笑其如師道之不立何是職之卑賤不足惜而師道之不立則深可惜也嗚呼書院盛事也延師盛舉也本院負其勢欲其入而閉之門卑職守其道寧喪溝壑而不顧且恨此相遇之所以甚殊而盛事之所以難成也歟謹將原禮呈納伏乞稽諸理而恕其狂矜其愚而不録其罪不致縉紳之笑無貽同年之羞職無任悚懼之至嘉靖三十一年正月十六日獄中與超然書院諸生書書院諸友文㑹下昔承雅愛隨具謝言想已達矣年來學業如何幸勿蹉跎也有懐不盡外獄中作數十首附覽然予之志亦見於此矣繫獄友生楊繼盛再拜祭文祭煤山文係先生狄道遺筆原集未載今補刻惟山有自然之利而人不知取山靈其熱中久矣昔知取矣未及于民而復塞山靈其抱恨久矣今特祭告復開使山之利得以利夫民而逺邇之民得以享山之利而今而後山靈其將以自慰耶亦或復自祕耶而使利及於無窮不止於一時已耶固知山靈之心必自慰而不自祕使利及於無窮而不止於一時已也同鄉祭焦范溪父文嗚呼唯公之德二靈協粹三懿用彰渾金璞玉秋月寒江唯公之容春栁秋霜碧梧翠竹巖巖其峯琅琅其璞唯公之行髙明卓茂榘矱堅貞不流不激可愛可親唯公之學書厨經府鼠獄雞碑落筆風雨擲地金石唯公之榮鸞封赫耀鳳誥輝煌彤雲豸䕶繡服天香唯公之壽遐踰七袠華胥夢殘雖不憗遺考終永延唯公之子燕山毓秀范水文宗朝陽鳴鳳海内人龍唯公之孫瑤光瑜潤蕙􅖢蘭芳森森竹立繩武有將嗚呼惟人有善孰悉諸身德容行學功備則淳惟天賜福萬有不齊榮壽子孫公介純禧萬事具足久為公慶一夢不回忽為公痛存隆其實没曜其聲死而不忘亦何足恫某等里閈雅誼休戚攸同俱客江南尤為闗情有淚如沱有哀如傷景行遺範山髙水長敬陳薄奠聊寫蕪詞以闡幽德以泄鄉私幽明雖隔精神則通惟靈炯炯鑒此愚衷嗚呼哀哉尚饗同鄉祭太孺人耿母毋氏文嗚呼痛哉天道不齊有如是哉以太孺人之植德幽貞宜享年有永以太孺人之相夫柔順宜偕老百年以太孺人之教子有成又宜膺其誥封而享其報茲固理之必然者也乃壽止五旬有一竟爾先逝而不少待耶天地間或然之數能幾何太孺人乃遽遭其變耶仁者弗壽良可恨焉相夫罔終良可悼焉教子未封良可痛焉此太孺人之所以可哀也然人而有子是謂不死子孫繩繩無窮是即已壽之無窮也况子而有敬菴在孰謂太孺人之享年不有永耶妻之於夫在盡其相之之道而已太孺人之治家教子俱有成績則相夫之道已盡是雖五十有一而百年事業固己畢矣孰謂太孺人之相夫未偕老耶我國家之推恩也不以亡而或間則夫人之沾恩也不待生而亦榮太孺人之存雖未有寵命之封而太孺人之没將不日膺誥命之贈又孰謂其教子之未享其報耶是葢或然之中而自有必然者在太孺人在天之靈獨不可以自慰也哉盛等里閈雅誼休戚攸同俱宦江南尤其闗情者觀太孺人之可慰雖共切夫景仰屬望之私憫太孺人之可哀實不勝其痛哭流涕之至謹陳蒭奠聊表微忱靈其有知洋洋來鑒尚饗祭馬南川父文唯靈性樸質茂德懿行醇摛光戢景抱璞含真不學而通不仕而崇不術而壽不疾而終嗚呼猗福籛壽桂子竹孫萬事己足不生而存某繫圜土舉世踽踽惟公憂惻遣問旁午自公之死孰為知音西望悵然涕淚沾巾乃為之歌曰松雲慘慘兮悲風烈薤露淅淅兮芳草歇寧山寂寂兮寒煙滅易水泠泠兮波聲咽郊原茫茫兮𤣥廬結松楸蒼蒼兮若木折追悼哲人兮腸欲絶何時生蒭兮奠短碣祭商少峯文嗚呼人臣策名於朝此身即為君之所有而所以欲盡人臣之職者則惟以致身為極幸而在官鞠躬盡瘁没於王事者固所以盡其職不幸而下獄窘辱困苦死于桎梏者亦所以盡其職也今公雖死於獄謂之非没於王事不可此身得致於君則臣職己盡人道已畢謂之非没寧不可亦何恨耶而一念憂國之心固將凝結於衷而萬年不朽則天地神人之所以共痛且惜者也况某等惡難相與休戚相闗幸翁之存猶懸赤幟之望感翁之死益輕再生之身其慟哭悲悼之情當何如哉謹陳薄奠尚其來饗祭易州楊五文嗚呼論友於三代之上當取諸縉紳休采之列論友於三代之下當求諸山林草澤農圃工賈之間葢君子小人之迭為隠見每隨時勢之盛衰而正人君子之相與惟取其義氣孚固要不當必以區區之勢位拘也自予登第除南銓始識西泉於賀客中然猶以為特豁達磊落人耳及予以諫阻馬市被罰逺謫雖骨肉至親亦惡其後於家而拙於官樂其死而幸其不歸也西泉乃慰嘉禮送之意反殷於初則其相與之情已出尋常萬萬去年春予以狂直排奸被杖繋獄其際誠危矣平昔指天論心者懼禍之及已則逺絶之不暇同時交遊者疾名之勝已則非毁之惟恐其不足而素以義氣著聞豪傑自負者恨言之侵已且售計投石要功洩憤於懽奸之門其孰與我乎西泉乃三視獄中通問不絶其徬徨拯䘏之意又殷於初雖齷齪庸瑣輩惕以重禍不恤也則與人交遊之善視世之以勢位相與者其情之厚薄為何如哉西泉之行誼在鄉曲聞望在遐邇固難以盡述然即此一節則其立心制行當於三代以上人物中求之矣視世之縉紳貴顯隨時異情者其人之賢不肖為何如哉二月初載攜乃郎慇懃視問握手交語傾倒肺肝相别無幾訃音頓至噫不棄我於患難如西泉者幾人而又奪之俾孤我於患難之中嗚呼痛哉西泉之正人君子使見用於世必能糾合善類不相背負可以同心共道克濟時艱縱厄於無位使假之以年必能表勵鄉邑寛鄙敦薄其挽時俗而躋之三代之上可幾也乃竟突然而逝老天何戕善人之酷如是耶世之生理已絶宜速死而倖免何限乃濫及正人君子如西泉者老天何福善禍淫之不公如是耶毋乃西泉命嗇適遭或然之數爾耶抑西泉古直不善媚天爾耶凡此數者皆不可曉狂直粗性甚為不平恨欲飛步太虚親問老天死果錯謬乞使生還更舉宜速死而倖免者代之庶可為作善作惡者勸且警也嗚呼哀哉尚饗附張宜人祭文補刻維皇明嵗次乙夘十一月朔越九日未亡妻張氏謹採首陽之薇挽汨羅之水致祭於夫君奉直大夫椒山楊公之靈曰於維我夫兩間正氣萬古豪傑忠心慷慨壯懐激烈奸回斂手鬼神號泣一言犯威五刑殉節闗腦比心嚴頭嵇血朱檻段笏張齒顔舌夫君不愧含笑永訣渺渺孤魂常依北闕嗚呼哀哉尚饗楊忠愍集巻二
