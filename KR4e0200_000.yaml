front:
  text: 世祖章皇帝御製表忠録序
  hash: sha256:a8d9cb451dfe5e634a9b01a73ff5081942599b223a5b7111f78d2f83d8ce8553
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0200_WYG_000-1a, image: WYG1278/WYG1278-0611a.png}
body:
  text: 自古賢臣正士效力王家率授命致身捐生赴義迹其所遭若無厚幸然而時過論定聲稱振揚及於代逺風遙流徽彌茂留連曩迹如遘其人是以孟軻有言奮乎百世之上百世之下聞者莫不興起也夫當其矢心靖獻奮不顧軀豈逆覩後人美歎靡窮哉獨以浩然之氣成特立之操內無懼心外無慙德而已顧竭志盡忠者人臣之誼善善惡惡者大道之公循省往哲愛結於中誠有不能自已者也朕萬幾之暇紬繹載籍每覽忠孝節義之事未嘗不反覆三致意焉至明史嘉靖年間有直臣楊繼盛者以諫死於戲賢哉觀其劾仇鸞嚴嵩二疏凜凜乎烈丈夫矣夫尊爵厚祿握權當軸者何可勝道然當時則榮沒則已焉甚或遺穢蒙嗤為世昭鑒去繼盛奚翅霄壤哉使繼盛獲遇明主庸其言顯其身其所建竪必有卓然可觀者而竟不得志而歾與龍逢比干先後合轍亦可悲矣朕讀其文傷其意慨然想見其為人故特表而出之以旌忠鯁垂法將來由斯以觀即謂繼盛至今存可也欽定四庫全書集部六楊忠愍集别集類五明提要臣等謹按楊忠愍集三卷明楊繼盛撰繼盛字仲芳號椒山容城人嘉靖丁未進士官至兵部武選司員外郎以疏劾嚴嵩為所搆陷與張經同棄市後追贈太常寺卿諡忠愍事迹具明史本傳繼盛本以經濟氣節自許不屑屑于文字後人重其人品掇拾成編仰蒙世祖章皇帝御製序文表其忠藎一經褒豫曠世猶生故雖朽蠧陳編彌深寶惜此本乃康熙間蕭山章鈺所校凡奏疏一卷雜文一卷詩一卷行狀碑記别為一卷附焉其論馬市劾嚴嵩二疏史傳限于體裁僅存大略集本乃其全文披肝瀝膽伉直之氣如生自作年譜一篇學問人品具見本末尤史傳所不能詳遺囑一篇作於臨刑前一夕墨迹至今世守倉卒之際數千言無一字塗乙尤足見其所養詞雖質朴而忠孝之意油然尤足以感動百世惟年譜中自記從韓邦竒學樂律夜夢虞舜一事頗涉怪異然繼盛非妄語者蓋覃思之極緣心搆象世説載衛玠以夢問樂廣廣云是想管子曰思之思之鬼神通之固亦理之所有昔吳與弼作日録自稱夢見孔子人疑其偽繼盛此語頗與相類明以來無疑之者此則繫乎其人有不待口舌爭者矣乾隆四十二年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部六楊忠愍集目録别集類五明卷一奏疏卷二序引跋説記書祭文卷三詩卷四附録碑記楊忠愍集原序少讀王章傳涕泗被面驟出對客不能飾客訝問故曰吾讀王仲卿傳故也既而讀楊椒山自著年譜驚曰此非仲卿乎仲卿學長安獨與妻居疾病無卧被入牛衣中與椒山讀書無卧被同仲卿為諌大夫進左曹訐宦官石顯免其官與椒山為南部員外進北部劾咸寧侯鸞降典史同仲卿起司隸校尉進京兆尹遽劾帝舅大將軍輔政王鳳下廷尉獄既而死與椒山起刑部員外遷兵部武選司遽劾相嵩下詔獄辟死又同然且仲卿之封事以日食椒山之入奏亦以日食仲卿之得罪以指斥張美人故椒山之得罪亦以扳援二王故所不同者兩人之妻皆沮其上書而椒山張夫人乞代夫死仲卿未有也然當仲卿下獄時妻女皆同時收繫女年十二夜起號哭曰平時獄上呼囚數常至九今八而止先死者必君也及旦而仲卿果死妻女徙合浦則是其妻之罹慘較有甚於椒山者豫嘗入史館詢椒山傳同館官曰未䦰也曰此一代有數人物當特為起草而俟䦰分乎同館官不答既而微聞同館有進劄子者曰孝宗非令主陽明非道學東林非君子謂夫儒者言事但當以迂全不以激骫東林之爭每始於意氣而終於朋黨此皆嘉隆間戅直諸習有以開之蓋暗指椒山言也豫曰然則如漢王章者非君子耶曰章不識輕重亢言殺身何有乎君子子不讀胡氏致堂諸史論乎其於兩漢人物率詆之不直一錢是以朱氏傳王荆公為名臣而稱秦會之太師為致有骨力何則不輕舉也夫以嶽忠武之死而猶譏其橫刺其直向前厮殺而無所於變也他可知矣豫氣塞而罷然而歸檢舊史見趙宋兩朝當君國之慘死事者不下什伯而宋史忠義傳並無一講學之徒厠身其間然後知薄事功并薄氣節皆宋學之陋而非恆情也今豫去史館又十餘年矣康熙戊寅同邑章子梅溪有感於椒山之為人取椒山所傳年譜與其生平詩若文合得四卷將刻以示世而屬豫為敘豫讀之淚滴滴下一如疇昔讀王章傳時雖不講學不汩其本心而章子以藝林之豪攻經生家年不及賈生獨能奮發慷愾聞椒山之風而興起焉且復輯其遺文惟恐其不傳於後而汲汲示世此非君子所用心乎夫椒山文士其於聖學未知其有當與否然而讀其疏而知君臣焉讀其諭兒文而知父子焉讀張夫人代夫疏而知其夫若婦焉讀王繼津書與弇州王氏所為狀而知朋友之交焉至於兄弟則年譜所記彰彰也近之言學者動輒薄事功而輕氣節至有訐陽明之學以明得意者夫陽明事功固所宜薄然而氣節者君子之梗概也椒山不幸與王章同兩漢儒術久為宋學所不許而陽明又不幸而龍場以前同於椒山道學既難言而兩人氣節又百不如權相之骨力然而猶尚有讀其書感其為人惟恐其不傳於後而汲汲示世如章子者則是人心之未亡而君子之猶可為也世有見斯集而興者乎其亦以豫之讀仲卿傳者讀之可矣康熙戊寅秋八月蕭山毛竒齡初晴氏題
