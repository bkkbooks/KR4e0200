body:
  text: 楊忠愍集卷三明楊繼盛撰詩節母貞女詩并序節母楊侍御匪石夫人祖母貞女其祖姑也世之論者皆以天下國家之責屬諸君子之身婦女若無所與焉者及觀斯傳然後知責之在君子者雖婦女亦足以盡之故張母之不忍忘其夫而守節終身張女之不忍棄其嫂而相從不嫁以至於死凡以各盡其心焉耳然而邦之風化世之氣運時之禎祥恆必因之則其所係也不亦大乎謂之無與於天下國家不可也夫姑感嫂節而貞志以決嫂為姑貞而節之守也益固相觀而善夫固如此苟事君者能如母之不忘其夫則天下皆忠臣矣與人者能如姑之不棄其嫂則天下皆義士矣忠臣義士遍於天下太和將在宇宙間矣則其所係也不為尤大乎此又係於觀感者何如耳誠願與君子共勉焉噫世之號為大丈夫者顧豈可自喪其志自虧其節反婦女之不若也乎哉謹成小律聊以表厥行而樹之風聲若夫書之以詔後世則有太史公在母為姑存身未死姑因嫂節老空樓萱階花泣百年淚漆室人含萬古愁寂寂風侵機杼冷隂隂月暗鏡臺秋從來多少冠裳客曽似沂陽婦女否送劉蘇涯鄉兄考績北上春樹蒼蒼春浦晴紅亭黯黯送霓旌留連鳥語憐人别荏苒楊花共酒傾桃塢雨餘香氣合錦江潮盡浪痕明烟浮曉巘巑岏碧霞逐征帆縹眇輕牛渚曲通瀛海澤緱峯迥倚秣陵城月高鷗在鏡中宿溪漲檣疑天際行牛野分星驚太史燕雲如幕覆神京楓宸報政恩波潤椿座稱觴彩袖輕知已漸隨流水逺離愁端與削山平論交每惜松顔落折栁應悲雁序更旅病偏因歸客劇夢思秪為故鄉生送君惟有東風淚點㸃沾巾無限情送萬楓潭少參山東二月江南氣尚寒石頭城外水漫漫雲連削壁千屏合日映離觴兩鑑看近渚晴花香細細傍人風栁絮團團聖朝此際求賢切補牘還思舊諫官挽任侍御乃尊二首四川巴縣人巴國指南思定祖九真遺澤長孫留琴臺蘚合乾坤老篆水烟橫天地秋寂寂寒雲覆隴樹淒淒疏雨暗江樓欲知身後流芳逺今日龍池有豸頭生芻廬外悲風鳴一曲哀吟萬古情五友亭閒山樹暗三槐堂寂月華明巴人淚落嘉陵水澄野歌連上蔡城海內知公身不死南臺伯雨振家聲揚子江望焦山題金山寺壁原集未載今補刻楊子有心涉揚子椒山無意合焦山地靈人傑天然巧倣佛神遊太古間送史沱村考績三首十月征車辭建業三山霜葉照離杯晴烟千里孤城暮寒雁三聲萬壑哀水國暮雲連渭樹郎官前宿近中台阿戎詩禮趨庭後為道雷門指日開一上離亭幾度愁十年塵夢嘆沈浮悠悠月笛山城夕漠漠寒雲江樹秋作客南來俱萬里送君北去獨孤舟他鄉正有思歸興况復征旌出石頭官閣不傳遷轉報紅亭厭詠送君詩昔乘驄老人猶識舊泣珠還今始知征雁迥隨雲樹沒德星暗逐使旌移彤庭久惜南遷客共聽絲綸出鳯池送大宗伯兩洲王公考績二首台斗光芒臨紫極東風行色動江干春歸吳苑晴花合天入燕雲曉斾寒禮樂百年開萬國星辰入座肅千官彤庭舊識尚書履天下蒼生屬謝安風送老鶯啼禁樹春隨紅斾過江干文昌夜度三台近玉劍晴浮五月寒一代雲龍虗鼎席百年禮樂屬春官相逢若問留臺客為道歸思鬢已殘代韓苑翁大司馬作夀太常汪春谷母七十南極星臨衡嶽動北堂萱映瀟湘明漢宫瑤軸封仙檢塗水梅花照楚城海日蟠桃開夀域天風青鳥下蓬瀛金陵江夏隔千里西望白雲無限情送狄道訓導李南峯掌教清水七載青氊多士服九重紫詔五雲開熙城桃李含春雨渭水魚龍驚夜雷悵望德星辭壁野相思明月照秦臺絃歌漫奏别離調衰栁西風無限哀同門生五十人游臥龍山寺出門已覺精神爽况復陽回宇宙清野樹含烟迷寺迥晴山披雪倚雲明風送榆錢入户三月不知春色暮重門深鎖貫城寒東風錯認王侯院悮送飛錢落枕單聞築外城二首萬里河山俱帝業如何謀計只神京備邊自是千年計塞外誰人築五城病急須從標上治如何緩處用工夫庸醫費盡篋中藥待得良醫藥有無和商中丞獄中生瓜二首天意昭殊節犴庭産異瓜可憐成落寞徒自吐英華疏蔓牽瑤草幽香雜瑞花蒼生懸望切何事思烟霞久獄半為家真同故里瓜行藏俱夢幻閴寂亦繁華天遺東陵種雲封西域花機心久已息即此是烟霞和商中丞朱葵三首寂寂朱葵著意栽相投情景自徘徊每因擎露含珠泣恐誤傾陽帶曉開疏影風移搖夜月晴烟雲擁覆西臺幽香暗度重華殿時有游蜂送雨來得意葵花斬草栽暫時相對且徘徊百年殊色因誰瘦萬古丹心向日開不共羣花發上苑却憐異種出燕臺老天似惜傾誠苦欲借夭桃雨露來檢㸃紅芳荷雨栽平分清景共徘徊醉傾晴日翩翻舞笑領天風次第開吟席珠璣超翰苑德星芒彩動天臺西山不減東山興佳事還隨花事來夏午睡胡敬所年兄因見教作此和謝三首逐日課程惟有睡百年勳業本無心聖君賜我安閒地好做羲皇世上人一息若存還報主萬年不死是吾心於今秖合昏昏睡笑殺當時勳業人疏懶百年還舊癖功名此日負初心本來面目頻頻照恐落寰中第二人賀獄吏孫東渠母夀并序豫以狂瞽被責下獄幾死者屢賴東渠子左右保護於其間其不屈權奸扶持善類迥出尋常萬萬矣乃堂家書來又諭東渠加意於豫中間辭語有名公大人所不能道豫感其子之德而嘉其母之賢也仲秋十二日適其母初度因作拙律以贈之觀者尚其諒豫之心乎南極星輝萊嶼動北堂萱映海天明百年花老秋風冷千里雲孤暮樹平赤圃生烟回紫氣青鸞傳詔下黃城題詩增我斑裳恨幾遍停思無限情送宋司獄致仕名秀山東寧海州人共說山中好甲子百年林下見高人醒初幻枕俱為夢歸去此身方屬君昏夜法星辭帝座秋風行色動乾坤西臺多少含寃者一聽離歌淚滿巾獄中紅苔寒柝淒淒哀怨絶隂雲黯黯鬱愁結西風滿地苔痕紅盡是渭囚寃淚血朝審途中口吟風吹枷鎖滿城香簇簇爭看員外郎豈願同聲稱義士可憐長板見親王聖明厚德如天地廷尉稱平過漢唐性癖從來歸視死此身原自不隨楊讀易有感眼底浮雲片片飛吉凶消長只幾希自從㑹得羲皇易始覺前時大半非九日崑峯賜飲擬和劉靜修先生九日九飲歌韻體九首一飲初歌第一歌乾坤萬物屬中和醉鄉能發天然樂况復幽人情興多二飲停杯歌二歌西風短髮任婆娑四時佳興俱堪賞誰道當秋百感多三飲幽人發浩歌百年風月屬豫多此身不是乾坤蒂留我蒼天欲若何四飲須聽第四歌傍人休笑醉顔酡曽經雪浪翻天湧風落杯中漫起波五飲起來鼓缶歌萬年宇宙一紅螺閒中看破盈虗殼聚散浮沈總太和六飲將酣豪興多仰天長嘯奈吾何片雲忽暗樓頭月只欲凌虗一拂摩七飲相關樂趣多風吹萬籟盡笙歌區區懷抱俱春意笑爾高秋奈我何八飲還驚飲量過疏狂成癖竟如何縱然痛飲珍珠酒為却愁懷愁轉多九飲渾忘披翠蓑聖明恩厚復如何釀成四海合歡酒欲共蒼生同醉歌題殘菊萬樹紅芳帶露殘獨憐黃菊對霜看東君不與花為主一任西風落砌寒見山四首為人題號雲穿石榻丹書濕亭枕泉崖白晝閒樽酒相看渾不厭知君原是見真山萬里風烟何日盡百年宇宙幾人閒春來應有桃千樹休認天台作故山市朝自有武陵趣一息無心一息閒得意不須登華嶽樽前卷石亦青山雲烟收盡酒巵間風靜一簾明月閒不解紅塵尋逺壑漫將詩思傍青山小雪破窗不奈西風冷况復蕭條一敝裘疏雪飄殘憂國淚寒更敲碎貫城愁悲歌勞擾慙燕士坐臥渾忘是楚囚四海尋家何處是此身死外更無求賞功喜作踏碎塞城誰問罪深居台閣亦加封聖明恩濶同天地不論無功與有功雪晴疏狂忘却一身憂思入蒼生始解愁萬事無成憐我拙百年有恨倩誰收每思北闕開宣室羞對西風泣楚囚且喜隂雲薄欲散依稀遙見鳯凰樓夜感月有懷鎖合西臺烟霧浮孤燈相對夜悠悠寒欺草榻凉如洗風捲星河動欲流報主獨憐成孟浪論交誰復憶同游相知舊月情如許猶自偷穿入氣樓寒夜和敬所韻乾坤一草閣宇宙半胸襟宿雨千年淚明霞萬古心疏燈暗客夢佳興帶愁吟肌骨渾如鐵寒威任爾侵觀新厯鳯厯初看小雪時百年甲子只須臾回頭往事渾如夢識破塵寰半局棋大風中鳯洲年兄賜顧言及先寄詩扇未到隂隂朔氣滿皇州烈烈悲風暗鳯樓吹合凍雲寒欲雪蹴低霜幹鳥應愁百年執法歸廷尉四海何人憐楚囚聞說右軍曽逺寄蒲葵珠玉莫空投送張觀海分教偃城十韻并跋相知每恨未相識聞說逺遊情更親曉日初分溫室樹文風先度偃城闉稀微殘月明霜劍密羃孤烟逐晚塵野鳥迥隨征斾沒客袍猶帶曙光新東觀海氣冲晴漢南望嵩雲接紫宸避俗秪應求吏隱此行原不為家貧河陽桃李蓓蕾合洛渚魚龍變化均氊榻謾勞悲冷局清朝亦自重儒臣心旌搖落懸雙淚守拙支離愧一身君愛寒官儂愛死古來天地幾癡人夫人有終日相處志或落落難合終身不相識亦有意氣相孚若素交然者蓋趨向之同與不同故耳觀海張子豫雖未知其為何如人然自豫下獄素相與者或逺避以示其疏詆排以忌其狂間有下石肆毒以取悅邀功於權奸之門者觀海乃通問不絶奔走不逮主張於公議羣聚談論之間雖時俗輩惕以重禍不恤也視素交者為何如哉今之任偃城訓導豫感其相知之深而悲其相違之逺也遂為詩以贈之噫天不以科第與豪傑俾得行其志乃濫及豫等闒茸者流不使正人君子相與以共濟王事固隔絶阻抑之俾離其羣而索其居良可悲矣然相知以心而不以迹各盡其心以求自靖雖終身不相見可也否則此言之贈秪貽泛交之譏今日相知之義將不為他日相見之羞乎言至於此又不覺其發狂矣劉司獄考滿索詩口占以贈之報最歸來寵命新問君何以答楓宸閒中檢㸃案頭簿三載平反多少人反平聲至日早醒偶成夢裏忽聞長樂鐘自驚誤却上新封覺來月照西窗白寂寂柝聲雜曉舂族兄東城親家鶴峯獄中賜顧同宿二夜感作寒燈高照影參差樽酒長吟慰夢思十載交游仍倚玉百年骨肉更相知追談雲雨如前日品第親朋異昔時明月不嫌草榻冷徘徊照我去遲遲因冷感興風滿孤城淚滿巾高寒偏傍薄衣人晴煙亦逐隂雲冷詩思應隨白髮新歸去此身方屬我愁來何事最傷神邊陲戍馬中原盜惆悵羞稱自靖臣哀商中丞少峯和徐龍灣韻四首憂時分外閫何事囚西臺君為河山死誰悲梁木摧法星仍近月此日獨憐才魂魄心猶壯奸諛骨已灰中外欲交歡書生虗將壇可憐當日獄乃爾借星冠白晝燕山暮紅雲渭水寒他年麟閣上遺像許誰看燕囚羞對泣梁獄共蕭騷功業半塵土秋風一羽毛雲連寇老竹星暗呂䖍刀遙憶瀟湘水悠悠咽楚濠吁嗟成永隔生死事相關氣節雲霄上勳名宇宙間孤魂憂國淚萬古鎖愁顔寇運將衰絶燕然未許攀微雪有感都城夜半初飛雪臺省應多祥瑞詩眼底餓夫寒欲死來年總稔濟誰饑五歲兒入視遣歸不去同宿數夜有感良知好向孩提看天下無如父子親我有乾坤大父母孝情不似爾情真小兒索余畫騎馬官因索詩隨吟父子問答口號我已因官纍爾何又愛官街前騎馬者轟烈萬人看懷鶴峯東城因寄二首屋梁落月應懷我春草池塘更夢誰記得别時懸淚眼佯為笑語怕相思久惜離羣恨見遲誰知相見倍相思從今憶弟休憐弟又恐别時勝此時聞有送贈與中官方士而起用者因遣祈雪秪風不應二首再入天台雲浦開金丹一粒脫凡胎逼人嵐氣浮眉宇聞自神仙洞裏來風捲寒雲落照斜郊原無日不飛沙可憐萬里瓊瑤雪化作銀杯散宦家元旦老天留我報君身惆悵蹉跎又一春幾度丹心連血嘔數莖白髮帶愁新回思往事真堪笑自幸更生似有神璞在不妨仍泣獻踟蹰無計逹楓宸元旦獄中自製棄紙燈籠獄卒以無文彩索詩賦此二首風蹴水晶碎綵聫珠翠浮何如皎皎月是我大燈毬有月何須燭無雲不怕風借誰竿百尺光照九天中和鳯洲王年兄詩韻未酬拚死恨虗負再生身和淚原非假誼書太任真寒收燕谷夕烟鎖漢宫春擾擾欲投石君何相問頻立春和平山韻殘雪禁春亦不遲晴烟送暖入簾幃香飛别院梅初發影過新痕日漸移風捲寒雲山曝畫晴歸庭樹鳥吟詩年來疏懶澀佳句欲報瓊瑤愧項斯送徐龍灣審録江南寥落雲司庭半虗有功此去更何如西臺月下幽人榻南國星隨使者車寒雁不堪雲暝夕秋風况是葉飛初秣陵若遇相知問為道疏狂病未除送李東明審録北直隸悵望霓旌拂曙暉嗟君此去故人稀南山判草更誰易北極恩光伴爾歸晚樹喜承新雨露春風醉舞舊斑衣漢廷此日須元禮早促仙舟赴帝闈苦冷三首凍日摧寒色狂風送冷塵慢愁衣服薄眼底是陽春彤雲迷白晝凉落暗風塵宇宙誰知已圜城别有春寂寂門常掩素衣無緇塵誰吹鄒子律寒谷欲回春有感短鬢娑婆烏布巾分明天地一狂人憂時淚應笙歌落報主心希宇宙新冦賊共傳知有我孤危不死豈無神寥寥勳業將蓬鬢虗負當年獻納臣和趙兵馬海壑韻殘魂零落又經年盡日悽然掩淚眠啼鳥似憐人寂寂空樓獨對月娟娟死生浪寄乾坤外勳業虗思泰嶽巔還草萬言書欲上踟蹰何處是堯天題郭劍泉歲寒松柏卷并跋君去霜臺無御史君來秋省有刑官百年節操惟松柏休負當時舊歲寒松柏雖歲寒不雕然色視春夏則少異矣及至春夏欣然蒼翠若與桃李爭芬芳者視歲寒時又異焉不知歲寒之色為本色耶春夏之色為本色耶則松柏者固隨時異矣然則吾人之操當出乎松柏之上可也劍泉山立之操故常變合一松柏惡足以擬之耶送張對溪之任廬州我期𤣥素回天力何事赤符此日行幾度為親焚諫草百僚忌爾著時名鶯啼晴樹秦烟暮旌拂廬雲曙色明若遇超然同志問為言終不負平生次梅軒韻有以夾竹桃花餽豫者梅軒詩贈隨吟謝之一㸃丹心一㸃忠竹花難入萬花叢年來不見青松友獨喜晴梅相映紅陳平山鵲噪詩以此答之惡事先傳應早避喜來不報亦何傷平生最愛鴉聲好野鵲毋勞噪夕陽又屢示災變塞口不言少見祥瑞上表爭賀鵲之類也有愧老鴉多矣好音惟恐隔深樹一聽惡聲共彈羅啼鳥亦知隨世變鴉鳴何少鵲何多因前作諭鴉鵲二首宇宙到頭俱夢幻生人何必歎雲泥疏狂見慣榮枯事鴉鵲從今俱慢啼可厭老鴉常折翅依人喜鵲亦空啼長安公子多飛彈且向雲山深樹棲苦隂雨雲黯黯兮鬱愁結雷隱隱兮哀怨絶雨澘澘兮血淚下水泠泠兮悲聲咽鳥亂啼兮憐人苦花零落兮誰是主欲入深兮無永穴欲高飛兮無翰羽捫胸問心心轉迷仰面呼天天不語混宇宙兮不分藹烟霧兮氤氲西風起兮天霽掛逺樹兮夕曛聚還散兮暮雲平晦復明兮日初晴何時回怒兮天王聖明題梅軒號江南有梅不見雪冀北雪多梅花稀惟有中州風土好梅花雪花相映暉孤根深托雲石裏天與清香豈偶爾不向春光藉艷陽寧隨上苑爭桃李老幹雪鋪翻助清層氷萬丈影涵明幽姿皎皎塵埃絶琴瑟逼人冷氣生萬樹叢中呈淡粧百花頭上吐寒芳翛然逺嶠輕風起吹落乾坤草木香一枝潔素羞粉白娟娟月姬著新裳一枝黃萼梁園發攢金綴粟色微茫一枝朱英丹換骨錯認夭桃帶淺霜一枝紫蕤蕾初破曉霞飛落緋衣傍一枝同心並頭開晴沙酣睡雙鴛鴦疏影籠月瘦骨插天徑稍穿石枯隙藏烟鶯蝶不相識風雨更媥妍氷葩凍蒂應難落一任淒凉羌管弄前川古瘦清香原太始品題羣花更無比一段幽閒惟自知豈容凡眼窺紅紫羡君孤梗迥絶俗梅花如人人如玉得意移來軒後栽松竹交映愜衷曲樽酒相看花解語似促早上金門去商家正須和羮材休為花神滯野墅花落結實調鼎春烹來端可薦楓宸惟願分種千萬山以解蒼生萬斛之渴塵臨刑詩二首浩氣還太虗丹心照萬古生前未了事留與後人補天王自聖明制度高千古平生未報恩留作忠魂補附贈楊公臨刑詩二首其一吳國倫食祿分憂士憐君獨處難囊頭追孟博斷舌繼常山雪映心猶赤風吹骨愈香傷心千古恨揮淚灑斜陽其二次前韻王遴仗節多臣子從容就死難忠懷吞瀚海義氣壓衡山魂斷關河杳名存草木香丈夫無别淚含笑赴雲陽相傳贈詩最多聞見之餘僅得四絶尚冀博覽君子惠頒夀世焉自著年譜豫家原口外小興州人國初被冦患徙入內地逺祖之在小興州者不可考祖楊百源徙保定府容城縣入樂安里籍居城東北河照村世業耕讀百源生述正述正生進進生俊俊生青青生富富生子三人長繼昌即豫同母兄次繼美豫庶兄父妾陳氏所出其三即不肖也母曹生豫於正德十一年丙子歲五月十七日辰丁丑年二歲戊寅年三歲己卯年四歲俱在母乳抱狀愈竒異頭甚長且圓大人皆以為夀星頭庚辰年五歲父妾陳有寵而妒遂各居産分為三母及兄與豫得其一辛巳年六歲嫂惑於庶母兄惑於嫂兄與母又各居耕種之苦負戴之勞母及姊俱身任之時豫亦嘗負一小束禾隨母姊同行見者為之嘆息流涕嘉靖改元壬午年七歲母得咳嗽勞疾七月六日捐館父攜庶母避之他所豫惟哭泣日則諸姊引攜夜則隨兄同寢其狼狽孤苦良為至極癸未年八歲夏即善牧牛或宿於場園或宿於瓜鋪至里孰見諸生揖容之美吟誦之聲心甚愛之欲從讀書兄曰若年幼焉用此豫曰年幼能牧牛乃不能讀書耶又告於父始得從師受書四五過即成誦從學四五日即能對句甲申年九歲退學供牧牛事兄以牧牛失期見責云即分居汝當餓死矣豫曰分亦何妨兄乃分屋一間米豆各數斗驢一頭豫早起自作飯食畢則將米豆上各畫字記之將門封鎖乘驢出牧午間回亦如之鄉人俱為流涕兄佯為不理至四五日後乃曰我戲而勒之分居即能料理家事如此於是又合居冬十月農事畢從孰師肄業乙酉年十歲從孰師學對句輒善一日客至無酒沽於館父出對云無酒是窮主豫即對曰有兒為名臣客歎賞不置父由此鍾愛之而庶母意亦稍稍敬矣丙戌年十一歲春沈師歸家從族伯翔讀恐誤學乃脫牧牛事九月父得反胃病召至家日夜問安侍養十月母始葬十一月八日父捐館時柩在堂本縣拘兄作收糧大户兄不得往豫遂代役其收納記算卯酉㸃查俱不錯誤丁亥年十二歲表兄王監生家寄食從劉先生簡齊學戊子年十三歲春劉師辭歸從邸先生諱宸號南臺後登甲辰進士復姓趙任南道御史一日師出同學作布陳相戰之勢師來衆皆藏匿師呼跪出對云藏形匿影對成者先起豫隨云顯姓揚名師云此絶對也自此相愛之甚教以作文法己丑年十四歲從隂師學師諱從光號臨池縣庠生與其子隂標號豫菴後登辛丑進士同筆硯發憤力學初若漸進庚寅辛卯壬辰年十五十六十七歲隂師棄學業專肆力於置産講解之功日疏同游又皆富室子弟日惟嬉戲紛擾學業無甚進兄促豫别學豫以無故不忍辭壬辰庶兄故癸巳年十八歲春府考送察院不中歸甚慙憤乃將四書自讀看一過又别治禮記經亦粗讀看一過五月府考取送察院獲充縣學生員與同庠王諱世雄號奕山共力親爨讀書於社學所居房三間前後無門又乏炭柴炕席嘗起臥氷霜而寒苦極矣時同㑹者胡默齊九齡侯中城忠愛許龍川澄隂南峯邦彥并豫菴奕山也甲午年十九歲春夏仍同奕山兄讀書社學秋本縣貢士李諱學詩號古城歸自太學設教寧國寺李端介有道之士教人不論貧富惟因材加厚豫遂從學復治書經一見師便竒之出然非與題命為文蓋寓相傳之意也豫文甚為稱許自是日日講究不懈冬十月娶胡村張公諱杲次女為妻先是鄉人見豫學頗進富室多許妻以女豫曰富室之幼女豈可處於兄嫂之間耶張豫兄之叔丈也家以耕織為業行誼為鄉里所重又聞其女長而甚賢與嫂既為姊妹其為妯娌必和遂娶之娶之後而妻之困苦殆不可言豫時居僧人佛永房豫無僮僕僧無徒衆僧嘗念經於外豫自操井竈之勞秫桿五根剖開可以熟飯冬自汲水手與筒凍住至房口呵化開始作飯夜嘗缺油每讀書月下夜無衾腿肚常凍轉起而繞室疾走其苦蓋難言萬一矣乙未年二十歲師教既勤豫資性頗高而用力又鋭一年之間學業遂成師曰我與汝今日為師徒後年可為同年矣方期來年謝諸生與豫同務舉子業焉丙申年二十一歲新春師得癱瘓病豫日侍湯藥百里之外請醫既無腳力且少盤費惟徒步忍餓潛行而已然師平日酒量甚大飲多痰盛竟不能起噫豫之心喪至今耿耿豈特三年哉是夏與庠友李鶴峯九臯及奕山㑹文於寧國寺上房隂雲樵飬晦等㑹文於五方村關王廟七月間提學湖廣朱公兩崖歲考優等補廩是秋文㑹散隂雲樵㑹長博學能文且性甚剛介豫慕其與已同也乃遂自運薪米往㑹於渠鄉日夜共肄業於野園而學大進焉丁酉年二十二歲春二月提學上元謝公與槐取考科舉內二題偶記不真方憂其被責及發落則居第二其稱許奬賞反倍於第一者批語內有學力才識過人其就未可量之句郡縣自是有名秋試落第在家教二姪戊戌年二十三歲引二姪復居縣寺佛永僧房夏天行瘟疫主僧病倒同舍生即亡去兄遣人促豫及二姪歸豫曰如豫去則此僧死在旦夕善遣家人回兄又遣人促曰如相染毋家歸也豫曰平日相與有病去之心寧忍乎如豫相染同死於此亦可也於是止取二姪歸豫為之親供飲食遍求醫藥夜則同寢二十日而僧愈時兄亦染病矣信到豫即歸不解衣而事者月餘兄愈妻又病無一人近豫自調飬之數日而愈是年傳染甚多豫親事三人而不染己亥年二十四歲時二姪思家且供給不便豫乃築草團瓢於西園肄業其中庚子年二十五歲春提學寧夏黃公南渠考科舉豫居第三時兄與本村富民訟於府兄屈賄不勝困於獄豫曰兄負屈如此尚焉應試為即往訴撫按俱以事小拒豫曰詞訟只當論屈之大小事之大小豈可拘也訟遂得白赴試中第二十一名主考童內方李方泉房考蒲田林瘦泉諱成立解元劉一麟也冬十二月長子生辛丑年二十六歲㑹試落第歸仍肄業團瓢秋同年孫聨泉諸兄書約入監有告兄曰坐監歷事可三年而畢須費二百金兄曰若此則負纍吾矣乃議析居不得已各居焉是冬入北監壬寅年二十七歲在監春季考第一五月該撥部歷事因先有聨泉之約不可背乃給引回家九月長女生冬徙居於縣癸卯年二十八歲春復居鄉一日豫置酒要兄之外父及諸親數人㑹飲至半酣間豫起而言曰初兄與豫析居謂豫坐監費多敗壞家事耳今豫坐監歸而農事所得更豐今欲與兄復同居何如諸親俱踊躍稱贊以為田氏復生也兄亦喜而允之此意之舉雖妻亦不知也秋得㑹試盤費銀三十兩與兄納為散官甲辰年二十九歲落第復入監祭酒徐少湖公也課豫以文曰真竒才也但少缺指引耳遂備束修受業乙巳年三十歲二月十九日次子生在京從少湖師學丙午年三十一歲二月長子殤從少湖師學丁未年三十二歲㑹試中三十八名主考孫毅齊張龍湖房考都給事中蒲田鄭于野公也殿試中二甲第十一名未開榜先鄭于野兩次差人報豫中第一甲蓋大學士夏公以豫䇿多傷時語遂不敢進呈觀工部政六月選南京吏部驗封司主事七月歸家九月買妾劉氏閏九月赴任十月到任考功司郎中鄭公淡泉諱曉時稱氷鑑一見而竒之退謂諸僚曰此人心志氣節事業將來未可言也遂甚相愛日告以居官守身之道與夫古今典故戊申年三十三歲本司郎中史沱村升豫乃署司印此司專管吏事弊端甚多豫立為章程投到則嚴其登籍先後則示以定序㸃查則革其頂替考選則防其代筆取撥則革其􅍐弊凡已往弊端俱為之一洗吏無不服堂上及諸僚俱稱賞焉是年專肆力於詩文之學己酉年三十四歲二月妾劉氏死三月二日三子生是時關西韓公苑洛諱邦竒為南京兵部尚書此翁善律呂皇極河洛天文地理兵陳之學而律呂為精豫師之先攻律呂之學三月而得其數乃告於師曰樂學非他學比不可徒事口說必自善制器自善作樂播之聲音各相和諧然後為是遂自置斧鋸刀鑽搆桐竹易絲漆先自製管管和矣製琴琴和矣製瑟瑟和矣製簫笙塤箎之類無不各和矣又合諸樂總奏之如出一律無不和焉師甚喜曰我學五十年止得其數今賴子製其器和其音當代之學舍子其誰歟一日師謂豫曰吾欲汝製十二律之管每管各備五音七聲各成一調何如豫有難色師曰固知此是難事古之伶倫無所因而作樂况今有度數可考乎豫退而欲製漫無可據苦心思索廢寢食者三日忽夜夢大舜坐於堂上豫拜之案上設金鐘一舜命豫曰此黃鐘也子可擊之取棰擊之三醒而恍若有悟呼妻然燈取竹與鋸鑽至明而成管六至已而十二管成呈於師師喜曰豫刻志樂之日九鶴飛舞於庭其應乃在子乎由是南都有知樂之名時翰林呂子巾石福建監生吳憲江西教官黃積慶俱用心於樂然呂巾石知樂之理而自不解作樂終涉於渺茫吳監生粗知樂數而不足以語精微之藴黃教官又執於三寸九分之管為黃鐘迷而不悟可與言樂者鮮矣庚戌年三十五歲春韓師致政歸謂豫曰子之樂已八九子之才不止於樂可旁通濟世之學至於樂俟子退閒時一整頓足矣豫遂大肆力於天文地理太乙壬竒兵陳之學時本部考功郎中何子吉陽殷子白野張子龍山余子九崖楊子朋石涂子任齊劉子蘇涯相與講論豫一一力行吉陽謂人曰椒山之果誠可語進道矣故豫生死利害義利之關見之甚明皆講學之力也秋冦犯京師南都擬勤王三日無肯行者諸公謂豫曰兄能為國一行乎豫曰弟雖不才然君父之難何敢辭也既而冦退議亦罷十月考滿本部考語云器深而志逺學懋而守嚴儒行占其夙成壯猷可以大受末句蓋謂豫粗知兵欲吏部用以治兵事也自南之北由山東路乃特趨曲阜謁孔顔廟又枉道登泰山至極頂因題絶句云志欲小天下特來登泰山仰觀絶頂上猶見白雲還末序云豫讀孟子書以為天下惟泰山為高也今陟其頂而觀之則知所謂高者特高於地耳而山之上其高固無窮也豫於是而悟學之無止法矣辛亥年三十六歲正月為次男聘李鶴峯兄第五女先是媒舉顯宦豫曰彼富我貧素不相厚志不相孚不敢許鶴峯者幼年同窗且剛直慷慨心志與已同遂結親焉二月買妾槐氏赴京考滿投文日即升兵部車駕司員外豫雖不才然素妄以天下事為己任况此時冦患最急又官居兵部志欲身親兵事掃除冦賊豈意一入兵部之後見其上下所行俱支吾常套不得著實幹事時有開馬市之議豫曰馬市一開天下事尚可為哉即欲疏陳其不可然方議遣豫行乃草開市稿候命下即上大意云馬市決不可開然既已遣臣臣言其不可是避難也謹條陳開市五事一欲諳達愛子入質二欲盡還虜去人口三欲别部落入冦俱在諳達承管四欲平其馬價分為三等五欲整兵以備戰守並用適一同僚見之乃報本部尚書趙守朴公諱錦守朴曰若此疏上則馬市決不得開乃别遣張主事才行豫遂上阻馬市之疏皇上連三閲即敕曰繼盛之言是也下閣臣擬票㫖語甚溫而咸寧侯仇鸞有揭帖進上乃下八臣㑹議八臣者大學士嚴嵩李本禮部尚書徐師階兵部尚書趙錦侍郎張時徹聶豹成國公朱希忠并仇鸞也此時鸞之寵勢甚盛而諸老亦無有實心幹天下事者皆欲苟安目前共以為馬市必可開雖徐公亦中懾之不敢異㑹議本上遂下豫錦衣獄拶一拶敲一百敲夾一夾後命下降豫陜西臨洮府狄道縣典史未到狄道時其上司僚友俱以豫為剛介性氣之士各懷疑畏然豫處上司僚友一如吏初選者數日後各喜曰初以先生難處不意今乃平易守禮可親可愛如此豫曰素位而行君子之常居官如戲場時上時下吾惟守分而已先是謫宫多靜坐不理縣事縣尹平定州李魚泉亦相愛不忍以瑣事相干豫請曰豈有日食祿而不事事者耶凡有可代勞者望不吝差委於是始付以事豫盡心為之俱有條理而各上司因之亦以難事相委居月餘府縣學生員從學者五十人日相講論甚有趣味將門生贄禮并俸資所餘買東山超然臺此臺相傳以為老子飛升之所蓋過函關西來所傳或不謬云乃於上蓋書院一區前三間為揖見之所中五間為講堂又後高處蓋殿三間為道統祠上九位為伏羲神農黃帝堯舜禹湯文武前側左為周公右為孔子兩壁側則顔曾思孟漢董仲舒隋王通唐韓愈宋周程張朱元許衡劉靜修明薛文清也狄道多西畨回子俱習畨經不讀儒書聘教讀二人於圓通寺設館募番漢童生讀書者百餘人至三月後各生俱知揖讓敬長上出入循禮其資質可進者三十餘人各父兄亦因而知道理棄畨教舉欣欣然相謂曰楊公來何遲也又此處山木去城近柴甚賤邇來則去城幾二百里柴漸貴而民病之城西七十里有煤山一區屢為生畨所阻官府不能制蓋畨民利於賣木煤開則失利豫往即開百姓便焉城西一帶俱園圃種蔬菜先年借洮水灌溉甚有大利歲久淤塞園圃漸廢募各園户疏通之而水利之盛倍於昔時狄道應徴糧草舊無官冊惟書手有簿相傳作弊甚大富者買減而貧者反增富者納輕而貧者反重豫乃拘集書手在於一所先算各户之總數次算一縣之總數比原額反多三十石蓋往時之飛詭俱查出是以多也將應徴輕重分為三等而各户之輕重均平無規避於其間者民間之地有糧重者白以與人亦不敢受豫白之於府將前所餘糧用輕價買地二千畝地價不足則賣豫所乘之馬及所得俸錢并妻首飾也諸生分種一千畝有井田之餘意其一千畝則佃種於人將所收子粒則擇諸生中之老成者四人收掌諸生之冠婚喪祭則量貧富補助餘則候年荒各生分用故此一事百姓之糧草既均而諸生養生之需亦足矣俗好禮佛近僧雖士夫不免豫一禁之舊習遂革初時有稱不便者後來始知惡僧而崇正矣邊方愚民惟以織褐為生上司差來承差書吏或減價和買或以雜物易換雖撫按守巡亦多若此然一褐之不得其價則一家之不得其養故有號泣於道者有求死於河者豫遂出告示禁約公差人員買褐蓋隂寓各上司之發價府縣買褐也無何巡按差人買褐豫收其牌票欲為申請而府掌印官相講乃已此聲一聞再無一上司來買褐百姓所得之利視昔年加倍故此一舉亦知非明哲之為蓋欲為百姓興利除害雖叢怨冒罪亦有所不暇顧云邊方之民久被殘虐易於感化豫在任則謳歌滿道去任則哭泣而送於百里之外者千餘人孔子所謂蠻貊之邦行信其然歟壬子年三十七嵗四月得升山東諸城知縣五月十一日得憑離狄道七月十二日到諸城任諸城濱海俗甚强悍豫治事不數日民皆守法吏不敢奸八月初一日南京户部雲南司主事之升報至其興學校開荒田緝武備立保甲繕城池均田糧平徭役數事平日之欲為而不得者方欲少效一二無何九月十七日憑至而止十月二十日到南京二十二日即有北刑部湖廣司員外之報十一月初八日抵淮安又有調兵部武選司之報先是得刑部報即圖歸家以敕命事焚黃祭先父母期告病不出及得兵部報則翻然思曰一嵗四遷其官朝廷之恩厚矣尚何以有身為哉舟中秉燭靜坐至四鼓妻問其故豫曰荷國厚恩欲思捨身圖報無下手得力處妻曰奸臣嚴閣老在位豈容直言報國耶當此之時只不做官可也豫聞其言乃知所以報國之本又思起南都日食之變遂欲因元旦日食奏劾大學士嚴嵩稿成恐過家則人事纒繞或不能元旦抵京乃由别路於十二月十二日到京十八日到任癸丑年三十八嵗元旦謄真本初二日齎至端門方欲進聞拿內靈臺官知本意不合即趣出日怏怏不懌至十四日乃齊戒沐浴三日至十八日本上二十日拿送鎮撫司打問先拶到手拶木繩俱斷豫曰鬼神在上尚用刑哉敲一百敲問所以主使之人豫曰當此時之臣奸邪大半皆嵩心腹此事固不可與之議且盡忠在已豈必待人主使如有人敢主使則彼當自為之矣又何必使人為哉夾一夾將脛骨又夾出問所以引用二王之故豫曰奸臣之誤國雖能欺皇上必不能欺二王蓋二王年幼且未冊封奸賊必不隄防避忌譬如人家家人作弊家長雖不知而家長之子未必不知也滿朝皆嵩之奸黨孰敢言彼之過皇上常不與二王相見此奸賊所以敢放肆無忌然止能瞞皇上一人二王固知之真矣至親莫若父子皇上若問二王必肯言彼之過也問官云若此豈敢回本又敲五十二敲夾一夾棍其問答之辭甚多豫始終不屈重打四十棍釘肘鐐送監至二十二日奉㫖錦衣衛打一百棍四棍一換送刑部從重議罪比依詐傳親王令㫖律絞監候方豫未上本之前司中日相與議論者汪子少泉名宗伊湖廣人周子松崖名冕四川人王子繼津名遴霸州人少泉則與謀議冒功一節乃其所見松崖則與知而不見其稿繼津則知其欲為而不知為何事上本後入部交牙牌辭僚友衆方知豫有此舉各疾讐逺避而一二知已雖有眷戀之情尚多畏縮之狀獨繼津則肝膽相許若親兄弟然豫觀其義氣激發情愛懇至遂托云豫二子一女一子已聘有妻一子尚未聘一女尚未許人長而娶嫁皆兄之事也繼津遂面許云此盡在弟一小女正與三令郎年嵗相當遂許焉自豫入獄鎮撫司刑部之保護皆繼津也其受打之先王子西巖名之誥湖廣人送蚺蛇膽一塊托校尉苗生者齎酒一壺云可以服蚺蛇膽豫曰椒山自有膽何必蚺蛇哉止飲酒一杯彼又云莫怕豫曰豈有怕打楊椒山者遂談笑赴堂受打未打之先心已有定主打之時兩眼觀心舌拄上齶牙齒緊對意不散亂口不呻吟蓋一呼呌則氣亂氣亂則血入心必死方打四五棍時心受疼不過若忙亂者遂一覺照自思此心亂矣於是提起念頭視己身若外物者打至五六十忽覺若有人以衣覆之者遂不覺甚痛謂之神助或其然歟打畢校尉即推入包袱擡出至門外家人以門扇擡之至法司門口巡風官乃同年江西李天榮革去門扇藥餌諸物一皆阻住豫兩腿腫粗相摩若一不能前後腫硬若木不能屈伸止手扶兩人用力努掙足不履地而行入獄提牢則奸黨浙江劉檟也舊規官繫獄則有官監檟乃下豫於民監自入監後棒瘡既上衝又為强走所努動方依牆而立忽兩耳響一聲不能聽兩目黑暗不能見物豫心自覺曰此乃死矣遂昏不省人事身不覺倒地若睡熟然至三更始蘇噫忽然而死忽然而蘇如睡又醒則人之生死亦甚易事也兩腿腫脹衝心不能忍無藥可用又無刀針可刺正無計間司獄陜西涇陽劉時守送茶一鍾豫飲之心稍定因茶思起人以瓦尖打寒事遂將鍾打碎取瓦之尖鋭者將竹筯破開夾瓦尖在內用線拴緊以尖放瘡上用鼓棰打筋入內五六分為此者獄吏山東黃縣孫儒犯人浮梁何成也遂血出兩腿打有五六十孔流血初噴丈餘後則順腿流於地一時約十數碗自出血後心稍清矣豫恐睡倒則血必奔心自打後出衛入刑部三日夜挺身端坐頭不至地以故不能傷生云藥餌既不可得豫潛使人在監買黃蠟香油自熬膏藥貼之至二十六日則右腿已潰將皮割去內肉流於地如稀糊止顯一坑長五寸濶三寸深一寸五分手摩至骨時有京師秀才侯冕送藥敷之又內侍趙用送藥服之劉檟禁繫甚嚴內外不通外面傳已死四日矣張𢎞齊差人入視托獄吏盧世經稍出牛骨簪一根家人始知豫不死方敕下刑部擬罪時山東司郎中同年史觀吾名朝賓福建人欲從輕議而尚書何鰲嵩之門生侍郎王學益世蕃兒女親家聽嵩主使遂擬此罪命下史欲有言學益怒目視之無何史降官矣刑帖到司獄司即下老監日夜籠㭱與衆囚為伍死尸在側備極苦楚二月初七八右腿已長肉左腿皮未割去遂潰腫如小甕毒氣上攻口舌生瘡不能飲食勢已危矣夜夢三金衣人領一青衣童子小盒內捧藥一丸以湯灌入覺則口舌不痛可喫飲食又想起以磁瓦尖打之連數十下不見膿血豫曰此瘡潰已深非瓦尖所能到也遂以小刀先用針線將腿皮穿透提起將刀刺入約一寸深周圍割一孔如錢大膿血流出方豫割肉時獄卒持燈手戰至將墜地曰關公割肉療毒猶藉於人不似老爹自割者當時約四五碗其內毒始脫矣日以布數十片拭膿每布約二尺每日輪用可濕兩次膿可流二三碗自初瘡至愈膿豈止六七十碗而已哉十六日左腿垂筋二條如簪粗一頭已斷一頭尚在腿上豫亦割之二十八日提牢官丘洲峯名秉文福建人乃獨仗公義遷豫於監東獄卒小房幸脫籠㭱九月朝審豫帶長板扭鐐出門觀者如堵至擁塞不能行入朝坐西廊下內臣圍豫觀者以千數有餽飲食者有送銀錢者豫俱却不受內臣益鼓舞稱贊而罵嚴嵩老賊者以萬數審時為首執筆者則吏部左侍郎王用賓也衆判以比律情真奏請題奉欽依著照舊監候處決甲寅年三十九嵗夏獄疫大作日與病者為伍遂染瘟疾時刑部醫官劉廷瑞江西人進豫發汗藥二服下藥二服豫病中缺主張俱依彼服遂昏不省人事提牢官又江西奸黨曹天祐此官乃人家奴僕讀書中進士後方出姓無耻小人又斷絶醫藥如初獄然人皆以豫必死五月提牢官乃浙江應養虛諱明德海寧人親檢湯藥視飲食十四日方出汗噫若使命不在死之久矣養虛說堂出豫老監遷於外庫居處則甚便方養虛遷豫時庸軟輩皆惕以重禍彼乃毅然為之其人品可知矣九月朝審福建李默為首仍判以情真題奉欽依又如前監候是冬巡撫艾居麓名希淳陜西米脂縣人管馬御史徐紳南直𨽻建德縣人知府趙欣陜西盩厔縣人共處置銀二百兩為豫買地三頃乙卯年四十嵗夏四月用媒約與繼津結親九月朝審復議情真奏請或云張經任南直隸總督因倭冦失事皇上先已告廟打科官必欲殺之經用厚賄買凂嵩費銀二萬及諸奸黨欲為彼出脫者判與豫同奏本請意以豫乃皇上所繫念之人或得混免或云嵩知經為皇上所必殺欲因以及豫也奏上皇上一見經㫖意遂云依律處決豫知之付命而已平昔豫同志輩若王繼津徐望湖王鳳洲楊朋石楊毅齊龔全山孫聨泉應養虛李鶴峯諸公為豫奔走救解鳳洲為余畫䇿以司業王材者渠門生也勸渠相救王果慨然往賊嵩初亦迫公論欲上疏見救猶豫不果方卜於神適賊心腹大理少卿胡植太僕少卿鄢懋卿在旁曰此何用卜繼盛負海內重望徐階得意門生階一日當國繼盛出而佐之我輩無遺類矣所謂養虎自遺患也賊子世蕃率諸孫復跪而泣曰爺如救楊某則舉家皆為繼盛魚肉矣賊即變色乃詭言卜不吉王材爭之曰繼盛之死不足惜也關係國家甚大老先生還當為天下後世慮然竟不可回報至豫豫付之一笑夫豫死豈係嵩毋論植懋卿輩天不過欲不朽此輩惡名耳故將半生逐年行事直書付男應尾應箕收藏以為後日墓志之用凡此皆據㭱牀書也赴義前一夕遺屬二首愚夫諭賢妻張貞古人云死有重於泰山有輕於鴻毛蓋當死而死則死比泰山尤重不當死而死則死無益於事比鴻毛尤輕死生之際不可不揆之於道也我一時間死在你前頭你是一箇激烈粗暴的性子只怕你不曉得死比鴻毛尤輕的道理我心甚憂故將這話勸你婦人家有夫死同死者蓋以夫主無兒女可守活著無用故隨夫亦死這才謂之當死而死死有重於泰山才謂之貞節若夫主雖死尚有幼女孤兒無人收養則婦人一身乃夫主宗祀命脈一生事業所係於此若死則棄夫主之宗祀隳夫主之事業負夫主之重托貽夫主身後無窮之慮則死不但輕於鴻毛且為衆人之唾罵便是不知道理的婦人我打一百四十棍不死是天保佑我那時不死如今豈有死的道理萬一要死也是重於泰山了所惜者只是兩箇兒子尚幼讀書俱有進益將來都成的只怕誤了他一箇女兒尚未出嫁無人教導看管怕惹人嗤笑我就死了留的你在教導我的兒女成人長大各自成家立計就合我活著的一般我在九泉之下也放心也歡喜也知感你如今咱一家兒無有我也罷了無有你一時成不的便人亡家破稱了人家的願惹人家的笑你是一箇最聰明知道理的何須我說千萬只是要你戒激烈的性子以我的兒女為重方可二貞年幼又無兒女我死後就著他嫁人衣服首飾都打發他我在監三年他發心喫齊誦經是他報我的恩了不可著他在家守寡咱哥雖無道理也無别意不過只是要便宜心腸凡事讓他些與他便宜他就歡喜了不可與他爭競二姐四姐要你常看顧他五姐六姐庶母死後也要親近他應民自幼養活他一場也須分與他些地土其餘家事諒你能善處我又說在後面故不須多言父椒山諭應尾應箕兩兒人須要立志初時立志為君子後來多有變為小人的若初時不先立下一箇定志則中無定向便無所不為便為天下之小人衆人皆賤惡你你發憤立志要做箇君子則不拘做官不做官人人都敬重你故我要你第一先立起志氣來心為人一身之主如樹之根如果之蒂最不可先壞了心心裏若是存天理存公道則行出來便都是好事便是君子這邊的人心裏若存的是人欲是私意雖欲行好事也有始無終雖欲外面做好人也被人看破你如根衰則樹枯蒂壞則果落故我要你休把心壞了心以思為職或獨坐時或夜深時念頭一起則自思曰這是好念是惡念若是好念便擴充起來必見之行若是惡念便禁止勿思方行一事則思之以為此事合天理不合天理若是合天理便行若是不合天理便止而勿行不可為分毫違心害理之事則上天必保護你鬼神必加佑你否則天地鬼神必不容你你讀書若中舉中進士思我之苦不做官也是若是做官必須正直忠厚赤心隨分報國固不可效我之狂愚亦不可因我為忠受禍遂改心易行懈了為善之志惹人父賢子不肖之誚我若不在你母是箇最正直不偏心的人你兩箇要孝順他凡事依他不可說你母向那箇兒子不向那箇兒子向那箇媳婦不向那箇媳婦要著他生一些兒氣便是不孝不但天誅你我在九泉之下也擺布你你兩箇是一母同胞的兄弟當和好到老不可各積私財致起爭端不可因言語差錯小事差池更面紅面赤應箕性暴些應尾自幼曉得他性兒的看我面皮若有些衝撞擔待他罷應箕敬你哥哥要十分小心合敬我一般的敬才是若你哥計較你些兒你便自家跪拜與他陪禮他若十分惱不解你便央及你哥相好的朋友勸他不可他惱了你就不讓他你大伯這樣無情的擺布我我還敬他是你眼見的你待你哥要學我才好應尾媳婦是儒家女應箕媳婦是官家女此最難處應尾要教道你媳婦愛弟妻如親妹不可因他是官宦人家女便氣不過生猜忌之心應箕要教導你媳婦敬嫂嫂如親姐衣服首飾休穿戴十分好的你嫂嫂見了口雖不言心裏便有幾分不耐煩嫌隙自此生矣四季衣服每遇出入妯娌兩箇是一樣的兄弟兩箇也是一樣的每喫飯你兩箇同你母一處喫兩箇媳婦一處喫不可各人合各人媳婦自己房裏喫久則就生惡了你兩箇不拘有天來大惱要私下請衆親戚講和切記不可告之於官若是一人先告後告者把這手卷送至於官先告者即是不孝官府必重治他央及你兩箇好歹與我長些志氣再預告問官老先生若見此卷幸諒我苦情教我二子再三勸誘使爭而復和則我九泉之下必有銜結之報你堂兄燕雄燕豪燕傑燕賢都是知好歹的人雖在我身上冷淡却不干他事俗語云好時是他人惡時是家人你兩箇要敬他讓他祖産分有未均處他若是愛便宜也讓他罷切記休要爭競自有旁人話短長也你兩箇年幼恐油滑人見了便要哄誘你或請你喫飯或誘你賭博或以心愛之物送你或以美色誘你一入他圈套便喫他虧不惟蕩盡家業且弄你成不的人若是有這樣人哄你便想我的話來識破他合你好是不好的意思便逺了他揀著老成忠厚肯讀書肯學好的人你就與他肝膽相交語言必信逐日與他相處你自然成箇好人不入下流也讀書見一件好事則便思量我將來必定要行見一件不好的事則便思量我將來必定要戒見一箇好人則思量我將來必要合他一般見一箇不好的人則思量我將來切休要學他則心地自然光明正大行事自然不㑹苟且便為天下第一等人矣習舉業只是要多記多作四書本經記文一千篇讀論一百篇䇿一百問表五十道判語八十條有餘功則讀五經白文好古文讀一百篇每日作文一篇每月作論三篇䇿二問切記不可一日無師傅無師傅則無嚴憚無稽考雖十分用功終是疏散以自在故也又必須擇好師如一師不愜意即辭了另尋不可因循遷延致誤學業又必擇好朋友日日㑹講切磋則舉業不患其不成矣居家之要第一要內外界限嚴謹女子十嵗以上不可使出中門男子十嵗以上不可使入中門外面婦人雖至親不可使其常來行走恐說談是非致一家不和又防其為姦盜之媒也只照依我行便是院墻要極高上面必以棘針緣的周密少有缺壞務要追究來歷如夏間零雨院墻倒塌必即時修起如雨天不便亦即時加上寨籬不可遷延日月庶止姦盜之原酒肉麵果油鹽醬菜必總收一庫房五榖糧食必總收一倉房當家之人掌其鎖鑰家人不得偷盜衣服要朴素房屋休高大飲食使用要儉約休要見人家穿好衣服便要做住好房屋便要蓋使好家活便要買此致窮之道也若用度少有不足便算計可費多少即賣田産補完切記不可揭債若揭債則日日行利纍的債深窮的便快戒之戒之田地四頃有餘彀你兩箇種了不可貪心見好田土又買蓋地多則門必高糧差必多恐至負纍受縣官之氣也與人相處之道第一要謙下誠實同幹事則勿避勞苦同飲食則勿貪甘美同行走則勿擇好路同睡寢則勿占牀席寧讓人勿使人讓我寧容人勿使人容我寧喫人虧勿使人喫我虧寧受人氣勿使人受我氣人有恩於我則終身不忘人有怨於我則即時丢過見人之善則對人稱揚不已聞人之過則絶口不對人言人有向你說某人感你之恩則云他有恩於我我無恩於他則感恩者聞之其感益深有人向你說某人惱你謗你則云他與我平日最相好豈有惱我謗我之理則惱我謗我者聞之其怨即解人之勝似你則敬重之不可有傲忌之心人之不如你則謙待之不可有輕賤之意又與人相交久而益密則行之邦家可無怨矣我一母同胞見在者四人你大伯二姑四姑及我大伯有四箇好子且家道富實不必你憂你二姑四姑俱貧窮要你時常看顧他你敬他合敬我一般至於你五姑六姑亦不可視之如路人也户族中人有饑寒者不能葬者不能嫁娶者要你量力周濟不可忘一本之念漠然不關於心我們係詩禮士夫之家冠婚喪祭必照家禮行你若不知當問之於人不可隨俗苟且庶子孫有所觀法你姐是你同胞的人他日後若富貴便罷若是窮你兩箇要老實供給照顧他你娘要與他東西你兩箇休要違阻若是有些違阻不但失兄弟之情且使你娘生氣又為不友又為不孝記之記之楊應民是我自幼撫養他成人你日後與他村裏莊窠一所墳左近地與他五十畝他若公道便與他若有分毫私心私積錢財房子地土都休要與他麯鉞他若守分到日後亦與他地二十畝村宅一小所若是生事心裏要回去你就合你兩箇丈人商議告著他原是四兩銀子買的他放債一年銀一兩得利六錢按著年問他要不可饒他恐怕小厮們照樣兒行你就難管福夀兒甲首兒楊愛兒都是監中伏侍我的人日後都與他地二十畝房一小所以上各人地都與他墳左近的著他看守墳墓許他種不許他賣覆奏本已上恐本下急倉卒之間燈下寫此殊缺倫序然居家做人之道盡在是矣拏去你娘看後做一箇布袋裝盛放在我靈前桌上每月初一十五合家大小靈前拜祭了把這手卷從頭至尾念一遍合家聽著雖有緊事也休廢了楊忠愍集卷三
